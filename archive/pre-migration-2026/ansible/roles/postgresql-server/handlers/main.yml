---
# PostgreSQL Server Role - Handlers

- name: restart postgresql
  ansible.builtin.systemd:
    name: postgresql
    state: restarted
    daemon_reload: yes

- name: reload postgresql
  ansible.builtin.command:
    cmd: docker exec postgresql pg_ctl reload
  changed_when: true

- name: restart docker
  ansible.builtin.systemd:
    name: docker
    state: restarted
