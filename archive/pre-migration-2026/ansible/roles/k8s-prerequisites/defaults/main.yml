---
# Role defaults for k8s-prerequisites
#
# This role configures OS prerequisites for running Kubernetes:
# - Kernel modules (overlay, br_netfilter)
# - Sysctl parameters for networking
# - Containerd container runtime
# - CNI plugins
#
# Most configuration is hardcoded as these are standard Kubernetes requirements.
# Override these only if you have specific requirements.

# CNI plugins version
cni_plugins_version: "1.3.0"

# Containerd configuration
containerd_systemd_cgroup: true
containerd_cni_bin_dir: "/opt/cni/bin"
