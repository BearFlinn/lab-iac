---
# GitHub Actions Runner Deployment
# This creates self-hosted runners for your organization/repository
#
# IMPORTANT: Update the 'organization' field with your GitHub org name
# Or use 'repository' instead for repo-specific runners

apiVersion: actions.summerwind.dev/v1alpha1
kind: RunnerDeployment
metadata:
  name: lab-runners
  namespace: actions-runner-system
spec:
  # Number of runner replicas
  # NOTE: Replicas are managed by HorizontalRunnerAutoscaler (autoscaler.yaml)
  # Do not set replicas here when using autoscaling
  # replicas: 1

  template:
    spec:
      # ServiceAccount for RBAC permissions
      serviceAccountName: github-runner

      # Organization or repository
      # Choose ONE:
      organization: grizzly-endeavors  # For org-wide runners
      # repository: grizzly-endeavors/your-repo  # For repo-specific runners

      # Use custom DinD image with Helm and kubectl pre-installed
      image: 10.0.0.226:32346/github-runner-dind:latest

      # Labels for targeting these runners in workflows
      labels:
        - self-hosted
        - kubernetes
        - linux
        - lab
        - rust

      # Enable Docker-in-Docker for building images
      dockerdWithinRunnerContainer: true

      # Docker MTU (helps with some network issues)
      dockerMTU: 1450

      # Resource limits
      resources:
        limits:
          cpu: "2"
          memory: "4Gi"
        requests:
          cpu: "1"
          memory: "2Gi"

      # Docker daemon configuration
      dockerdContainerResources:
        limits:
          cpu: "1"
          memory: "2Gi"
        requests:
          cpu: "500m"
          memory: "1Gi"

      # Volume mounts for Docker daemon configuration
      volumeMounts:
        - name: docker-daemon-config
          mountPath: /etc/docker
          readOnly: true

      volumes:
        - name: docker-daemon-config
          configMap:
            name: docker-daemon-config
