#### Contents of the preconfiguration file (for Debian 13 trixie)
#### K8s Worker Node — generic, no swap, parameterized hostname/IP
#### Used by build-worker-iso.sh — placeholders replaced at build time
#### IP addresses: see ansible/group_vars/all/network.yml (single source of truth)

### Early command — auto-detect boot disk
# Finds the first non-removable block device via /sys (no lsblk in installer)
# Skips USB drives to prevent writing to the installer media
d-i preseed/early_command string \
    for dev in /sys/block/*; do \
        name="$(basename "$dev")"; \
        case "$name" in loop*|ram*|sr*) continue ;; esac; \
        [ "$(cat "$dev/removable" 2>/dev/null)" = "1" ] && continue; \
        readlink -f "$dev" | grep -q usb && continue; \
        debconf-set partman-auto/disk "/dev/$name"; \
        break; \
    done

### Localization
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i console-setup/ask_detect boolean false
d-i debconf/priority select critical

### Network configuration
# DHCP during install; static IP configured in late_command
# DHCP on wired ethernet — skip wireless entirely
d-i netcfg/choose_interface select auto
d-i netcfg/wireless_wep string
d-i netcfg/wireless_essid string
d-i netcfg/wireless_security_type select open
d-i netcfg/get_hostname string __HOSTNAME__
d-i netcfg/get_domain string local

### Mirror settings
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/http/proxy string
d-i mirror/suite string trixie
d-i apt-setup/non-free-firmware boolean true
d-i apt-setup/non-free boolean true
d-i apt-setup/contrib boolean true
d-i apt-setup/services-select multiselect security, updates
d-i apt-setup/security_host string security.debian.org

### Account setup
d-i passwd/root-login boolean false
d-i passwd/user-fullname string Bear Flinn
d-i passwd/username string bearf
d-i passwd/user-password password __SSH_PASSWORD__
d-i passwd/user-password-again password __SSH_PASSWORD__
d-i user-setup/allow-password-weak boolean true
d-i user-setup/encrypt-home boolean false

### Clock and time zone setup
d-i clock-setup/utc boolean true
d-i time/zone string America/New_York
d-i clock-setup/ntp boolean true

### Partitioning — NO SWAP
# Custom recipe: EFI system partition + single ext4 root
# No swap partition is created — K8s nodes must never have swap
# Boot disk is auto-detected: first non-removable, non-USB disk
d-i partman-efi/non_efi_system boolean true
d-i partman-auto/method string regular
d-i partman-auto/expert_recipe string \
    k8s-no-swap :: \
        512 512 512 fat32 \
            $iflabel{ gpt } \
            $reusemethod{ } \
            method{ efi } \
            format{ } \
        . \
        1000 10000 -1 ext4 \
            method{ format } \
            format{ } \
            use_filesystem{ } \
            filesystem{ ext4 } \
            mountpoint{ / } \
        .
d-i partman-auto/choose_recipe select k8s-no-swap
d-i partman-basicfilesystems/no_swap boolean false
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-lvm/confirm boolean true
d-i partman-lvm/confirm_nooverwrite boolean true
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

### Package selection
tasksel tasksel/first multiselect standard, ssh-server
d-i pkgsel/include string openssh-server sudo curl wget vim htop \
    net-tools dnsutils nfs-common python3
d-i pkgsel/upgrade select full-upgrade
popularity-contest popularity-contest/participate boolean false

### Boot loader installation
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string default

### Finishing up the installation
d-i finish-install/reboot_in_progress note

### Preseed late command
# Sets up: sudoers, SSH key auth, static IP, swap prevention, hostname
d-i preseed/late_command string \
    in-target sh -c 'echo "bearf ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/bearf'; \
    in-target chmod 0440 /etc/sudoers.d/bearf; \
    in-target systemctl enable ssh; \
    in-target mkdir -p /home/bearf/.ssh; \
    in-target chmod 700 /home/bearf/.ssh; \
    in-target sh -c 'echo "__SSH_PUBLIC_KEY__" > /home/bearf/.ssh/authorized_keys'; \
    in-target chmod 600 /home/bearf/.ssh/authorized_keys; \
    in-target chown -R bearf:bearf /home/bearf/.ssh; \
    in-target systemctl mask swap.target; \
    in-target sh -c 'echo "vm.swappiness=0" > /etc/sysctl.d/99-no-swap.conf'; \
    IFACE="$(ip route show default 0.0.0.0/0 | awk '{print $5}' | head -1)"; \
    echo "# Managed by preseed — will be verified by Ansible"  > /target/etc/network/interfaces; \
    echo "source /etc/network/interfaces.d/*"                  >> /target/etc/network/interfaces; \
    echo ""                                                    >> /target/etc/network/interfaces; \
    echo "auto lo"                                             >> /target/etc/network/interfaces; \
    echo "iface lo inet loopback"                              >> /target/etc/network/interfaces; \
    echo ""                                                    >> /target/etc/network/interfaces; \
    echo "auto ${IFACE}"                                       >> /target/etc/network/interfaces; \
    echo "allow-hotplug ${IFACE}"                              >> /target/etc/network/interfaces; \
    echo "iface ${IFACE} inet static"                          >> /target/etc/network/interfaces; \
    echo "    address __STATIC_IP__"                            >> /target/etc/network/interfaces; \
    echo "    netmask 255.255.255.0"                            >> /target/etc/network/interfaces; \
    echo "    gateway __GATEWAY__"                              >> /target/etc/network/interfaces; \
    echo "    dns-nameservers __DNS__"                          >> /target/etc/network/interfaces
