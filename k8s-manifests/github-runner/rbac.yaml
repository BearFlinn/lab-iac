---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: github-runner
  namespace: actions-runner-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: github-runner-deployer
rules:
  # Allow managing all common application resources
  - apiGroups: ["", "apps", "networking.k8s.io"]
    resources:
      - pods
      - services
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
      - configmaps
      - secrets
      - persistentvolumeclaims
      - persistentvolumes
      - ingresses
      - serviceaccounts
    verbs: ["*"]
  # Allow reading nodes and namespaces
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
    verbs: ["get", "list"]
  # Allow reading storage classes
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: github-runner-deployer
subjects:
  - kind: ServiceAccount
    name: github-runner
    namespace: actions-runner-system
roleRef:
  kind: ClusterRole
  name: github-runner-deployer
  apiGroup: rbac.authorization.k8s.io
