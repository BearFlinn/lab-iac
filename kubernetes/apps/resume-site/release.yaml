apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: resume-site
  namespace: flux-system
spec:
  interval: 5m
  releaseName: resume-site
  targetNamespace: resume-site
  chart:
    spec:
      chart: ./deploy
      sourceRef:
        kind: GitRepository
        name: resume-site
        namespace: flux-system
      reconcileStrategy: Revision
  install:
    remediation:
      retries: 2
  upgrade:
    remediation:
      retries: 2
