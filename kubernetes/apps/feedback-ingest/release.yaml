apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: feedback-ingest
  namespace: flux-system
spec:
  interval: 5m
  releaseName: feedback-ingest
  targetNamespace: residuum-feedback
  chart:
    spec:
      chart: ./deploy
      sourceRef:
        kind: GitRepository
        name: feedback-ingest
        namespace: flux-system
      reconcileStrategy: Revision
  install:
    remediation:
      retries: 2
  upgrade:
    remediation:
      retries: 2
