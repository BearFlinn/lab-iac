apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: landing-page
  namespace: flux-system
spec:
  interval: 5m
  releaseName: landing-page
  targetNamespace: landing-page
  chart:
    spec:
      chart: ./deploy
      sourceRef:
        kind: GitRepository
        name: landing-page
        namespace: flux-system
      reconcileStrategy: Revision
  install:
    remediation:
      retries: 2
  upgrade:
    remediation:
      retries: 2
