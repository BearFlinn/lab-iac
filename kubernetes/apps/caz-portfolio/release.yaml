apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: caz-portfolio
  namespace: flux-system
spec:
  interval: 5m
  releaseName: caz-portfolio
  targetNamespace: caz-portfolio
  chart:
    spec:
      chart: ./deploy
      sourceRef:
        kind: GitRepository
        name: caz-portfolio
        namespace: flux-system
      reconcileStrategy: Revision
  install:
    remediation:
      retries: 2
  upgrade:
    remediation:
      retries: 2
