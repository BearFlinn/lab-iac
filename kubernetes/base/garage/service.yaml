---
# Headless service with manual endpoints for Garage S3
apiVersion: v1
kind: Service
metadata:
  name: garage
  namespace: storage
  labels:
    app: garage
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - name: s3
      port: 3900
      targetPort: 3900
      protocol: TCP
    - name: web
      port: 3902
      targetPort: 3902
      protocol: TCP
---
# Manual endpoints pointing to tower-pc Garage instance
apiVersion: v1
kind: Endpoints
metadata:
  name: garage
  namespace: storage
  labels:
    app: garage
subsets:
  - addresses:
      - ip: 10.0.0.249
    ports:
      - name: s3
        port: 3900
        protocol: TCP
      - name: web
        port: 3902
        protocol: TCP
