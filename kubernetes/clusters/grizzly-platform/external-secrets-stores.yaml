apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: external-secrets-stores
  namespace: flux-system
spec:
  # Applies ClusterSecretStore + ExternalSecret resources that depend
  # on ESO's CRDs being installed by the external-secrets HelmRelease
  # in the main "infrastructure" Kustomization. Same pattern as
  # cert-manager-issuers.
  dependsOn:
    - name: infrastructure
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./kubernetes/infrastructure/external-secrets-stores
  prune: true
  wait: true
  timeout: 5m
  healthChecks:
    - apiVersion: external-secrets.io/v1
      kind: ClusterSecretStore
      name: openbao
