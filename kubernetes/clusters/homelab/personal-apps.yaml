# Personal / third-party app deployments live in the lab-apps repo.
# Platform pieces stay in this repo (lab-iac); lab-apps is pure manifests.
#
# Auth uses the same GitHub App credentials as other GitRepository sources
# (see github-app-credentials secret in flux-system).
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: lab-apps
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/Grizzly-Endeavors/lab-apps
  ref:
    branch: main
  provider: github
  secretRef:
    name: github-app-credentials
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: personal-apps
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure
    - name: cert-manager-issuers
    - name: external-secrets-stores
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: lab-apps
  path: ./apps
  prune: true
  wait: false
  timeout: 5m
