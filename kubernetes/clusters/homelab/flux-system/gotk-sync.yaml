# Originally generated by `flux bootstrap`. Manually updated in Phase 7a to
# switch from SSH deploy key auth against BearFlinn/lab-iac to GitHub App
# auth against grizzly-endeavors/lab-iac. See ADR-020 + docs/k8s-cluster-standup.md.
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: master
  provider: github
  secretRef:
    name: github-app-credentials
  url: https://github.com/grizzly-endeavors/lab-iac
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./kubernetes/clusters/homelab
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
