apiVersion: v1
kind: Service
metadata:
  name: arc-controller-metrics
  namespace: arc-systems
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: gha-runner-scale-set-controller
    app.kubernetes.io/instance: arc-controller
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30885
      protocol: TCP
      name: metrics
