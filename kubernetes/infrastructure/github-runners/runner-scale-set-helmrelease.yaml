apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-runner-set
  namespace: flux-system
spec:
  interval: 30m
  dependsOn:
    - name: arc-controller
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.14.0"
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
  targetNamespace: arc-runners
  install:
    createNamespace: false
  values:
    githubConfigUrl: "https://github.com/grizzly-endeavors"
    githubConfigSecret: github-runner-pat
    runnerScaleSetName: "lab-runners"
    minRunners: 0
    maxRunners: 4
    # NOTE: we do NOT use `containerMode.type: dind` — that shortcut would
    # inject a default dind sidecar whose dockerd has no insecure-registry
    # config, which prevents pushing to the in-cluster OCI registry at
    # registry.registry.svc.cluster.local:5000 (served over plain HTTP, see
    # kubernetes/infrastructure/registry/). Instead we define both runner
    # and dind containers explicitly below, with --insecure-registry on
    # dockerd's args.
    listenerMetrics:
      counters:
        gha_started_jobs_total:
          labels: ["repository", "organization", "job_name", "event_name"]
        gha_completed_jobs_total:
          labels: ["repository", "organization", "job_name", "event_name", "job_result"]
      gauges:
        gha_assigned_jobs:
          labels: ["name", "namespace", "repository", "organization"]
        gha_running_jobs:
          labels: ["name", "namespace", "repository", "organization"]
        gha_idle_runners:
          labels: ["name", "namespace", "repository", "organization"]
        gha_min_runners:
          labels: ["name", "namespace"]
        gha_max_runners:
          labels: ["name", "namespace"]
        gha_desired_runners:
          labels: ["name", "namespace"]
    template:
      spec:
        initContainers:
          - name: init-dind-externals
            image: ghcr.io/actions/actions-runner:latest
            command: ["cp", "-r", "-v", "/home/runner/externals/.", "/home/runner/tmpDir/"]
            volumeMounts:
              - name: dind-externals
                mountPath: /home/runner/tmpDir
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:latest
            command: ["/home/runner/run.sh"]
            env:
              - name: DOCKER_HOST
                value: unix:///run/docker/docker.sock
            resources:
              limits:
                cpu: "2"
                memory: 4Gi
              requests:
                cpu: "1"
                memory: 2Gi
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work
              - name: dind-sock
                mountPath: /run/docker
                readOnly: true
          - name: dind
            image: docker:dind
            args:
              - dockerd
              - --host=unix:///run/docker/docker.sock
              - --group=$(DOCKER_GROUP_GID)
              # Allow pushing to the in-cluster OCI registry over plain HTTP.
              # Matches kubernetes/infrastructure/registry/service.yaml.
              - --insecure-registry=registry.registry.svc.cluster.local:5000
            env:
              - name: DOCKER_GROUP_GID
                value: "123"
            securityContext:
              privileged: true
            volumeMounts:
              - name: work
                mountPath: /home/runner/_work
              - name: dind-sock
                mountPath: /run/docker
              - name: dind-externals
                mountPath: /home/runner/externals
        volumes:
          - name: work
            emptyDir: {}
          - name: dind-sock
            emptyDir: {}
          - name: dind-externals
            emptyDir: {}
