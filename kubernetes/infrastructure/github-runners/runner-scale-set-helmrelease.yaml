apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: arc-runner-set
  namespace: flux-system
spec:
  interval: 30m
  dependsOn:
    - name: arc-controller
  chart:
    spec:
      chart: gha-runner-scale-set
      version: "0.14.0"
      sourceRef:
        kind: HelmRepository
        name: actions-runner-controller
  targetNamespace: arc-runners
  install:
    createNamespace: false
  values:
    githubConfigUrl: "https://github.com/grizzly-endeavors"
    githubConfigSecret: github-runner-pat
    runnerScaleSetName: "lab-runners"
    minRunners: 0
    maxRunners: 4
    containerMode:
      type: "dind"
    listenerMetrics:
      counters:
        gha_started_jobs_total:
          labels: ["repository", "organization", "job_name", "event_name"]
        gha_completed_jobs_total:
          labels: ["repository", "organization", "job_name", "event_name", "job_result"]
      gauges:
        gha_assigned_jobs:
          labels: ["name", "namespace", "repository", "organization"]
        gha_running_jobs:
          labels: ["name", "namespace", "repository", "organization"]
        gha_idle_runners:
          labels: ["name", "namespace", "repository", "organization"]
        gha_min_runners:
          labels: ["name", "namespace"]
        gha_max_runners:
          labels: ["name", "namespace"]
        gha_desired_runners:
          labels: ["name", "namespace"]
    template:
      spec:
        containers:
          - name: runner
            image: ghcr.io/actions/actions-runner:latest
            resources:
              limits:
                cpu: "2"
                memory: 4Gi
              requests:
                cpu: "1"
                memory: 2Gi
