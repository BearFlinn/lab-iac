apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - helmrepository.yaml
  - helmrelease.yaml
  - metrics-service.yaml
  # ClusterIssuer is applied by a separate Flux Kustomization
  # (kubernetes/clusters/homelab/cert-manager-issuers.yaml) that depends
  # on this Kustomization — required because the cert-manager CRDs only
  # exist after the HelmRelease succeeds.
