# cert-manager controller metrics — exposed via NodePort for R730xd Prometheus
# (same pattern as argo-workflows/metrics-services.yaml).
# Scrape target: <control-plane-ip>:30888
apiVersion: v1
kind: Service
metadata:
  name: cert-manager-metrics
  namespace: cert-manager
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: cert-manager
    app.kubernetes.io/component: controller
  ports:
    - port: 9402
      targetPort: 9402
      nodePort: 30888
      protocol: TCP
      name: tcp-prometheus-servicemonitor
