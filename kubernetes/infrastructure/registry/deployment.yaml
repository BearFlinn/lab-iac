apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry
  namespace: registry
  labels:
    app.kubernetes.io/name: registry
    app.kubernetes.io/component: oci-registry
spec:
  replicas: 1
  strategy:
    type: Recreate  # single replica backed by shared S3; avoid N-writer races on config
  selector:
    matchLabels:
      app.kubernetes.io/name: registry
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry
    spec:
      containers:
        - name: registry
          image: registry:2.8.3
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          env:
            # Storage: S3 backend → MinIO bulk on R730xd (see
            # ansible/roles/r730xd-minio-bulk). Credentials come from the
            # registry-s3-creds Secret seeded by
            # ansible/playbooks/seed-app-secrets.yml.
            - name: REGISTRY_STORAGE
              value: "s3"
            - name: REGISTRY_STORAGE_S3_REGION
              value: "us-east-1"  # MinIO ignores region, but the registry requires a value
            - name: REGISTRY_STORAGE_S3_REGIONENDPOINT
              value: "http://10.0.0.200:9002"  # R730xd LAN IP + MinIO bulk API port
            - name: REGISTRY_STORAGE_S3_BUCKET
              value: "lab-registry"
            - name: REGISTRY_STORAGE_S3_FORCEPATHSTYLE
              value: "true"  # required for MinIO
            - name: REGISTRY_STORAGE_S3_SECURE
              value: "false"
            - name: REGISTRY_STORAGE_S3_ACCESSKEY
              valueFrom:
                secretKeyRef:
                  name: registry-s3-creds
                  key: accessKey
            - name: REGISTRY_STORAGE_S3_SECRETKEY
              valueFrom:
                secretKeyRef:
                  name: registry-s3-creds
                  key: secretKey
            # HTTP server (plain HTTP — in-cluster only; see docs/decisions for
            # the deferred external TLS decision).
            - name: REGISTRY_HTTP_ADDR
              value: ":5000"
            # Allow image deletion (useful for cleanup of old tags).
            - name: REGISTRY_STORAGE_DELETE_ENABLED
              value: "true"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
