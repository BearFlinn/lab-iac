apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ingress-nginx
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: ingress-nginx
      version: "4.11.3"
      sourceRef:
        kind: HelmRepository
        name: ingress-nginx
  targetNamespace: ingress-nginx
  install:
    createNamespace: false
  values:
    controller:
      # DaemonSet — one controller pod on every node so NodePort traffic
      # to any node has a local backend. Required by our externalTrafficPolicy
      # choice (we rely on X-Real-IP from Caddy for client IP rather than
      # externalTrafficPolicy: Local, keeping the topology flexible).
      kind: DaemonSet
      service:
        type: NodePort
        nodePorts:
          http: 30487
          https: 30356
        externalTrafficPolicy: Cluster
      ingressClassResource:
        name: nginx
        enabled: true
        default: true
        controllerValue: "k8s.io/ingress-nginx"
      ingressClass: nginx
      # Trust the X-Forwarded-* headers sent by Caddy on the VPS so that
      # access logs and real-ip modules see the original client IP.
      config:
        use-forwarded-headers: "true"
        compute-full-forwarded-for: "true"
        use-proxy-protocol: "false"
      metrics:
        enabled: true
        # NodePort so R730xd Prometheus can scrape from outside the cluster
        # (matches the cert-manager / argo-workflows scrape pattern).
        service:
          type: NodePort
          nodePort: 30889
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      admissionWebhooks:
        enabled: true
      allowSnippetAnnotations: false
    defaultBackend:
      # Let nginx-ingress emit its own 404 rather than running a separate
      # default backend pod.
      enabled: false
