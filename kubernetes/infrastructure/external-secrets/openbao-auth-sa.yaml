# OpenBao Kubernetes auth wiring.
#
# The ServiceAccount openbao-auth is the "reviewer" identity: OpenBao
# presents its bearer token to the cluster's TokenReview API to verify
# incoming SA tokens from ESO (and any other future in-cluster consumer).
# The ClusterRoleBinding to system:auth-delegator is what grants
# TokenReview access.
#
# The openbao-auth-token Secret is a long-lived bearer token bound to
# the SA — K8s 1.24+ no longer auto-generates these, so we mint one
# explicitly via the `kubernetes.io/service-account-token` Secret type.
# This is the reviewer-JWT that goes into OpenBao's `auth/kubernetes/
# config`. If it's ever invalidated, regenerate via:
#   ansible-playbook ansible/playbooks/rotate-openbao-keys.yml \
#     --tags k8s-auth-jwt
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openbao-auth
  namespace: external-secrets
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openbao-auth-token-reviewer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: openbao-auth
    namespace: external-secrets
---
apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  name: openbao-auth-token
  namespace: external-secrets
  annotations:
    kubernetes.io/service-account.name: openbao-auth
