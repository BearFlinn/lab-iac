# OpenBao self-signed CA for ESO to verify the LAN-only OpenBao server.
# The CA PEM is public-safe to commit (self-signed, no secret material
# — it's the "trust-this-issuer" anchor, not the signing key). Rotated
# every ~10 years by the r730xd-openbao role; when that happens, copy
# the new cert from r730xd:/etc/openbao/tls/ca.crt into the data.ca.crt
# field below and commit. Flux reconciles; ESO reconnects on next
# refresh cycle.
#
# Bootstrap procedure:
#   scripts/fetch-openbao-ca.sh > /tmp/ca.crt   (or just scp r730xd:/etc/openbao/tls/ca.crt)
#   <paste PEM into data.ca.crt below>
#
# The playbook ansible/playbooks/setup-openbao-k8s-auth.yml does this
# automatically during the initial k8s-auth wiring by re-applying this
# Kustomization after populating the ConfigMap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: openbao-ca
  namespace: external-secrets
data:
