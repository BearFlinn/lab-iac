apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argo-workflows
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: argo-workflows
      version: "1.0.7"
      sourceRef:
        kind: HelmRepository
        name: argo
  targetNamespace: argo
  install:
    createNamespace: false
  values:
    controller:
      metricsConfig:
        enabled: true
        path: /metrics
        port: 9090
      resources:
        limits:
          cpu: 200m
          memory: 256Mi
        requests:
          cpu: 100m
          memory: 128Mi
    server:
      enabled: true
      authModes:
        - server
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
        requests:
          cpu: 50m
          memory: 64Mi
    artifactRepository:
      archiveLogs: true
      s3:
        bucket: argo-artifacts
        endpoint: "10.0.0.200:9002"
        insecure: true
        accessKeySecret:
          name: argo-minio-credentials
          key: accesskey
        secretKeySecret:
          name: argo-minio-credentials
          key: secretkey
