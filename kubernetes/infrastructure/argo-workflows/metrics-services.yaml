# Argo Workflow controller metrics — exposed via NodePort for R730xd Prometheus
apiVersion: v1
kind: Service
metadata:
  name: argo-controller-metrics
  namespace: argo
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: argo-workflows-workflow-controller
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30886
      protocol: TCP
      name: metrics
---
# Argo Server metrics — exposed via NodePort for R730xd Prometheus
apiVersion: v1
kind: Service
metadata:
  name: argo-server-metrics
  namespace: argo
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: argo-workflows-server
  ports:
    - port: 2746
      targetPort: 2746
      nodePort: 30887
      protocol: TCP
      name: metrics
