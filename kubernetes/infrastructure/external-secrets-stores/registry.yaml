apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: registry-s3-creds
  namespace: registry
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: openbao
  target:
    name: registry-s3-creds
    creationPolicy: Owner
  data:
    - secretKey: accessKey
      remoteRef:
        key: grizzly-platform/stores/minio-bulk
        property: root_user
    - secretKey: secretKey
      remoteRef:
        key: grizzly-platform/stores/minio-bulk
        property: root_password
