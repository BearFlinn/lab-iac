# ClusterSecretStore backed by OpenBao. All ExternalSecret manifests
# in this cluster reference `spec.secretStoreRef = {kind:
# ClusterSecretStore, name: openbao}`.
#
# Auth: Kubernetes auth method (OpenBao configures a TokenReview
# reviewer JWT via ansible/playbooks/setup-openbao-k8s-auth.yml). ESO
# presents its own SA token at authentication time, OpenBao validates
# via TokenReview, returns a short-lived OpenBao token scoped to the
# `eso-platform-read` policy.
#
# Path convention: KV v2 mount `secret/`, platform secrets under
# `grizzly-platform/<domain>/<name>`. See docs/decisions/024-platform-
# secrets-on-openbao.md and the path layout in the quickref runbook.
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: openbao
spec:
  provider:
    vault:
      server: "https://10.0.0.200:8200"
      path: "secret"
      version: "v2"
      caProvider:
        type: ConfigMap
        name: openbao-ca
        key: ca.crt
        namespace: external-secrets
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
