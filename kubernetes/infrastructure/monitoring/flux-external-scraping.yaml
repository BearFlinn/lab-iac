apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-scraping
  namespace: flux-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.0.0.0/24
      ports:
        - port: 8080
          protocol: TCP
