apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-scraping
  namespace: flux-system
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    # Allow from any source — NodePort traffic gets SNATed by Cilium,
    # so the original lab subnet IP (10.0.0.x) is not preserved.
    # This is safe: only metrics on port 8080, private LAN.
    - ports:
        - port: 8080
          protocol: TCP
