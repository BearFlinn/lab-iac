---
# Proxy VPS Setup Playbook
# Configures Hetzner VPS with Caddy reverse proxy for K8s cluster access
#
# Prerequisites:
#   - VPS provisioned and accessible via SSH (Host proxy-vps in ~/.ssh/config)
#   - NetBird tunnel established between VPS and K8s cluster
#   - Ansible vault configured with cloudflare_api_token
#
# Usage:
#   ansible-playbook -i ansible/inventory/proxy-vps.yml \
#     ansible/playbooks/setup-proxy-vps.yml --vault-password-file .vault_pass

- name: Setup Proxy VPS
  hosts: all
  gather_facts: yes
  become: yes

  vars_files:
    - ../group_vars/all/vars.yml
    - ../group_vars/all/vault.yml

  pre_tasks:
    - name: Verify SSH connectivity
      ansible.builtin.ping:

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes

    - name: Install essential packages
      ansible.builtin.apt:
        name:
          - curl
          - wget
          - git
          - vim
          - htop
          - net-tools
          - dnsutils
          - ufw
          - fail2ban
        state: present

  tasks:
    - name: Configure timezone
      community.general.timezone:
        name: "{{ timezone | default('UTC') }}"

    - name: Configure UFW firewall
      when: enable_firewall | default(true) | bool
      block:
        - name: Reset UFW to default state
          community.general.ufw:
            state: reset

        - name: Set UFW default policies
          community.general.ufw:
            direction: "{{ item.direction }}"
            policy: "{{ item.policy }}"
          loop:
            - { direction: 'incoming', policy: 'deny' }
            - { direction: 'outgoing', policy: 'allow' }

        - name: Allow SSH on port 2222
          community.general.ufw:
            rule: allow
            port: '2222'
            proto: tcp
            comment: 'SSH'

        - name: Allow HTTP/HTTPS
          community.general.ufw:
            rule: allow
            port: "{{ item.port }}"
            proto: "{{ item.proto }}"
            comment: "{{ item.comment }}"
          loop: "{{ ufw_web_rules | default([]) }}"

        - name: Enable UFW
          community.general.ufw:
            state: enabled

    - name: Configure UDP port forwarding via NAT
      when: udp_forwarding_rules is defined and udp_forwarding_rules | length > 0
      block:
        - name: Enable IP forwarding
          ansible.posix.sysctl:
            name: net.ipv4.ip_forward
            value: '1'
            sysctl_set: yes
            reload: yes

        - name: Allow UFW routed traffic for forwarded ports
          community.general.ufw:
            rule: allow
            route: yes
            proto: udp
            port: "{{ item.dest_port | string }}"
            to_ip: "{{ item.dest_ip }}"
            comment: "Forward: {{ item.comment | default(item.src_port ~ '/udp') }}"
          loop: "{{ udp_forwarding_rules }}"

        - name: Add NAT rules to UFW before.rules
          ansible.builtin.blockinfile:
            path: /etc/ufw/before.rules
            insertbefore: "^\\*filter"
            marker: "# {mark} ANSIBLE MANAGED - UDP PORT FORWARDING NAT RULES"
            block: |
              *nat
              :PREROUTING ACCEPT [0:0]
              :POSTROUTING ACCEPT [0:0]
              {% for rule in udp_forwarding_rules %}
              # {{ rule.comment | default(rule.src_port ~ '/udp forward') }}
              -A PREROUTING -p udp --dport {{ rule.src_port }} -j DNAT --to-destination {{ rule.dest_ip }}:{{ rule.dest_port }}
              -A POSTROUTING -d {{ rule.dest_ip }}/32 -p udp --dport {{ rule.dest_port }} -j MASQUERADE
              {% endfor %}
              COMMIT
          notify: Reload UFW

    - name: Verify fail2ban is running
      ansible.builtin.systemd:
        name: fail2ban
        state: started
        enabled: yes

    - name: Install and configure Caddy
      when: enable_caddy | default(true) | bool
      block:
        - name: Validate Caddy email is set
          ansible.builtin.assert:
            that:
              - caddy_email is defined
              - caddy_email | length > 0
              - "'@' in caddy_email"
            fail_msg: "caddy_email must be a valid email address"

        - name: Include Caddy role
          ansible.builtin.include_role:
            name: caddy

  post_tasks:
    - name: Final connectivity check
      ansible.builtin.wait_for:
        port: 443
        timeout: 30

    - name: Display deployment summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "Proxy VPS Setup Complete"
          - "=========================================="
          - "Hostname: {{ inventory_hostname }}"
          - "K8s Proxy: {{ enable_k8s_proxy | default(false) }}"
          - "K8s Endpoint: {{ k8s_ingress_endpoint | default('N/A') }}"
          - ""
          - "Configured services:"
          - "  Non-K8s services: {{ caddy_services | default([]) | length }}"
          - "  Wildcard K8s proxy: *.{{ caddy_root_domain | default('N/A') }} -> {{ k8s_ingress_endpoint | default('N/A') }}"
          - ""
          - "Root domain: {{ caddy_root_domain | default('N/A') }} -> {{ caddy_root_redirect_target | default('N/A') }}"
          - "UDP forwarding: {{ udp_forwarding_rules | default([]) | length }} rule(s)"
          - "=========================================="

  handlers:
    - name: Reload UFW
      community.general.ufw:
        state: reloaded
