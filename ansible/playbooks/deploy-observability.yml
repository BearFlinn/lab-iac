---
# deploy-observability.yml — Deploy observability stack to R730xd
#
# Deploys Prometheus, Alertmanager, Loki, Tempo, Grafana, and Alloy as
# Docker Compose services on the R730xd storage server. Uses foundation
# stores (MinIO Obs for S3 object storage, PostgreSQL for Grafana database).
#
# All observability data persisted on ZFS pool (tank/observability/*).
#
# See ADR-004 for design decisions.
#
# Prerequisites:
#   - R730xd baseline applied (setup-r730xd.yml — installs Docker)
#   - ZFS pool and datasets created (r730xd-zfs.yml)
#   - Foundation stores running (deploy-foundation-stores.yml — MinIO Obs, Postgres)
#   - Vault secrets configured (see vault.yml.example)
#
# Usage:
#   ansible-playbook -i ansible/inventory/r730xd.yml \
#     ansible/playbooks/deploy-observability.yml \
#     --vault-password-file .vault_pass -v
#
# Deploy individual services:
#   ... --tags prometheus
#   ... --tags loki
#   ... --tags tempo
#   ... --tags grafana
#   ... --tags alloy
#
# Endpoints (after deploy):
#   Prometheus:   http://10.0.0.200:9090
#   Alertmanager: http://10.0.0.200:9093
#   Loki:         http://10.0.0.200:3100
#   Tempo API:    http://10.0.0.200:3200
#   Tempo OTLP:   10.0.0.200:4317 (gRPC), 10.0.0.200:4318 (HTTP)
#   Grafana:      http://10.0.0.200:3000

- name: Deploy observability stack
  hosts: r730xd
  become: yes
  gather_facts: yes

  pre_tasks:
    - name: Verify ZFS pool is mounted
      ansible.builtin.command: findmnt /mnt/zfs
      changed_when: false
      failed_when: zfs_check.rc != 0
      register: zfs_check
      tags: [always]

    - name: Verify Docker is installed
      ansible.builtin.command: docker --version
      changed_when: false
      failed_when: docker_installed.rc != 0
      register: docker_installed
      tags: [always]

    - name: Verify Docker is running
      ansible.builtin.service_facts:
      tags: [always]

    - name: Fail if Docker service is not running
      ansible.builtin.fail:
        msg: >
          Docker is not running. Run setup-r730xd.yml first to install and
          enable Docker.
      when: "'docker.service' not in ansible_facts.services or
             ansible_facts.services['docker.service'].state != 'running'"
      tags: [always]

    - name: Verify MinIO Obs is healthy
      ansible.builtin.uri:
        url: "http://localhost:9000/minio/health/live"
        status_code: 200
      register: minio_obs_health
      tags: [always]

    - name: Verify PostgreSQL is healthy
      ansible.builtin.command: >
        docker exec foundation-postgres pg_isready -U postgres -p 5432
      changed_when: false
      failed_when: pg_health.rc != 0
      register: pg_health
      tags: [always]

    # --- MinIO Obs bucket and service account provisioning ---

    - name: Check if MinIO client is available in container
      ansible.builtin.command: docker exec minio-obs mc --version
      changed_when: false
      failed_when: false
      register: mc_check
      tags: [loki, tempo]

    - name: Configure MinIO client alias
      ansible.builtin.command: >
        docker exec minio-obs mc alias set local
        http://localhost:9000
        {{ minio_obs_root_user }}
        {{ minio_obs_root_password }}
      changed_when: false
      no_log: true
      when: mc_check.rc == 0
      tags: [loki, tempo]

    - name: Create Loki S3 bucket
      ansible.builtin.command: >
        docker exec minio-obs mc mb --ignore-existing local/observability-loki
      register: loki_bucket
      changed_when: "'Bucket created' in loki_bucket.stdout"
      when: mc_check.rc == 0
      tags: [loki]

    - name: Create Tempo S3 bucket
      ansible.builtin.command: >
        docker exec minio-obs mc mb --ignore-existing local/observability-tempo
      register: tempo_bucket
      changed_when: "'Bucket created' in tempo_bucket.stdout"
      when: mc_check.rc == 0
      tags: [tempo]

    - name: Check if observability MinIO user exists
      ansible.builtin.command: >
        docker exec minio-obs mc admin user info local {{ minio_observability_access_key }}
      changed_when: false
      failed_when: false
      register: minio_user_check
      when: mc_check.rc == 0
      tags: [loki, tempo]

    - name: Create observability MinIO user
      ansible.builtin.command: >
        docker exec minio-obs mc admin user add local
        {{ minio_observability_access_key }}
        {{ minio_observability_secret_key }}
      no_log: true
      when: mc_check.rc == 0 and minio_user_check.rc != 0
      tags: [loki, tempo]

    - name: Grant observability user readwrite access to Loki bucket
      ansible.builtin.command: >
        docker exec minio-obs mc admin policy attach local readwrite
        --user {{ minio_observability_access_key }}
      changed_when: false
      when: mc_check.rc == 0
      tags: [loki, tempo]

    # --- Grafana PostgreSQL database provisioning ---

    - name: Ensure Grafana database user exists
      ansible.builtin.command: >
        docker exec foundation-postgres psql -U postgres -c
        "DO $$ BEGIN
          IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname = 'grafana') THEN
            CREATE ROLE grafana WITH LOGIN PASSWORD '{{ postgres_password }}';
          END IF;
        END $$;"
      changed_when: false
      no_log: true
      tags: [grafana]

    - name: Check if Grafana database exists
      ansible.builtin.command: >
        docker exec foundation-postgres psql -U postgres -tAc
        "SELECT 1 FROM pg_database WHERE datname='grafana'"
      register: grafana_db_check
      changed_when: false
      tags: [grafana]

    - name: Create Grafana database
      ansible.builtin.command: >
        docker exec foundation-postgres psql -U postgres -c
        "CREATE DATABASE grafana OWNER grafana"
      when: grafana_db_check.stdout != '1'
      tags: [grafana]

  roles:
    - role: r730xd-prometheus
      tags: [observability, prometheus]
    - role: r730xd-exporters
      tags: [observability, exporters]
    - role: r730xd-loki
      tags: [observability, loki]
    - role: r730xd-tempo
      tags: [observability, tempo]
    - role: r730xd-grafana
      tags: [observability, grafana]
    - role: r730xd-alloy
      tags: [observability, alloy]
