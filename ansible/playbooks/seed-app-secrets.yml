---
# Seed out-of-band Kubernetes secrets for app workloads.
#
# Flux reconciles app charts from git, so secrets can never live in-repo.
# This playbook reads sensitive values from the Ansible vault and creates
# (or updates) the corresponding Kubernetes Secrets directly via kubectl,
# mirroring the pattern established in setup-k8s-gitops.yml Play 4
# (github-app-credentials).
#
# Tags let individual secrets be rotated without touching unrelated state:
#   --tags registry       → just the in-cluster OCI registry's S3 creds
#                           + the lab-registry MinIO bucket
#   --tags resume-site    → resume-site's CEREBRAS/GEMINI API keys
#   --tags app-repo-flux  → push FLUX_OPS_APP_{ID,PRIVATE_KEY} to each app
#                           repo (needed because Grizzly-Endeavors is on
#                           GitHub Free, where org secrets with visibility
#                           "all" do not reach private repos)
#   --tags all            → everything (default)
#
# Prerequisites:
#   - kubeconfig at ~/.kube/config (or KUBECONFIG env)
#   - Vault decrypted (--vault-password-file or .vault_pass)
#   - For the registry tag: docker installed on localhost (used to run
#     minio/mc for bucket creation). The jumpbox has docker.
#
# Usage:
#   ansible-playbook ansible/playbooks/seed-app-secrets.yml
#   ansible-playbook ansible/playbooks/seed-app-secrets.yml --tags registry
#   ansible-playbook ansible/playbooks/seed-app-secrets.yml --tags resume-site
#
# See docs/decisions/020-app-delivery-model.md for why secrets land here
# and not in a Flux-reconciled manifest.

- name: Seed app-level secrets into the K8s cluster
  hosts: localhost
  connection: local
  gather_facts: no

  vars:
    kubeconfig: "{{ lookup('env', 'HOME') }}/.kube/config"

  vars_files:
    - "{{ playbook_dir }}/../../ansible/inventory/group_vars/all/vault.yml"
    - "{{ playbook_dir }}/../../ansible/inventory/group_vars/all/vars.yml"

  tasks:
    # ================================================================
    # In-cluster OCI registry — S3 credentials + MinIO bucket
    # ================================================================
    - name: Registry — seed S3 credentials and ensure MinIO bucket
      tags: [registry, all]
      block:
        - name: Ensure lab-registry bucket exists on MinIO bulk
          ansible.builtin.shell: |
            set -euo pipefail
            docker run --rm \
              -e MC_HOST_minio="http://${MC_USER}:${MC_PASS}@10.0.0.200:9002" \
              minio/mc:latest \
              mb --ignore-existing minio/lab-registry
          environment:
            MC_USER: "{{ vault_minio_bulk_root_user }}"
            MC_PASS: "{{ vault_minio_bulk_root_password }}"
          register: mc_mb
          changed_when: "'Bucket created successfully' in mc_mb.stdout"
          no_log: true

        - name: Ensure registry namespace exists
          ansible.builtin.command: >
            kubectl create namespace registry --dry-run=client -o yaml
          register: ns_yaml
          environment:
            KUBECONFIG: "{{ kubeconfig }}"
          changed_when: false

        - name: Apply registry namespace
          ansible.builtin.command: kubectl apply -f -
          args:
            stdin: "{{ ns_yaml.stdout }}"
          environment:
            KUBECONFIG: "{{ kubeconfig }}"
          changed_when: false

        - name: Create/update registry-s3-creds secret
          ansible.builtin.shell: |
            kubectl create secret generic registry-s3-creds \
              --from-literal=accessKey="{{ vault_minio_bulk_root_user }}" \
              --from-literal=secretKey="{{ vault_minio_bulk_root_password }}" \
              -n registry \
              --dry-run=client -o yaml | kubectl apply -f -
          environment:
            KUBECONFIG: "{{ kubeconfig }}"
          changed_when: false
          no_log: true

        - name: Verify registry-s3-creds secret has required keys
          ansible.builtin.command: >
            kubectl get secret registry-s3-creds -n registry
            -o jsonpath={.data}
          environment:
            KUBECONFIG: "{{ kubeconfig }}"
          changed_when: false
          register: reg_secret_check

        - name: Assert registry-s3-creds key shape
          ansible.builtin.assert:
            that:
              - "'accessKey' in reg_secret_check.stdout"
              - "'secretKey' in reg_secret_check.stdout"
            fail_msg: >
              registry-s3-creds is missing accessKey or secretKey. The
              registry Deployment will CrashLoopBackOff until this is fixed.
            success_msg: "registry-s3-creds has both accessKey and secretKey"

    # ================================================================
    # App repos — FLUX_OPS_APP_ID + FLUX_OPS_APP_PRIVATE_KEY
    #
    # The register-app.yaml reusable workflow in lab-iac requires these
    # two secrets to generate a short-lived GitHub App token scoped to
    # lab-iac. Org secrets are set up at grizzly-endeavors but the Free
    # plan restricts org-secret access to public repos only; the app
    # repos are private, so we push the same values down to the repo
    # level via `gh secret set`.
    #
    # Rotation: update vault_github_app_{id,private_key}, then re-run:
    #   ansible-playbook ansible/playbooks/seed-app-secrets.yml \
    #     --tags app-repo-flux
    # ================================================================
    - name: App repos — push FLUX_OPS_APP secrets for register-app.yaml
      tags: [app-repo-flux, all]
      vars:
        flux_ops_app_repos:
          - Grizzly-Endeavors/landing-page
          - Grizzly-Endeavors/caz-portfolio
          - Grizzly-Endeavors/resume-site
      block:
        - name: Create temporary directory for PEM
          ansible.builtin.tempfile:
            state: directory
            suffix: flux-ops-app
          register: pem_tmpdir
          no_log: true

        - name: Write GitHub App private key to tmp file
          ansible.builtin.copy:
            content: "{{ vault_github_app_private_key }}"
            dest: "{{ pem_tmpdir.path }}/key.pem"
            mode: "0600"
          no_log: true

        - name: Push FLUX_OPS_APP_ID to each app repo
          ansible.builtin.command:
            argv:
              - gh
              - secret
              - set
              - FLUX_OPS_APP_ID
              - --repo
              - "{{ item }}"
              - --body
              - "{{ vault_github_app_id }}"
          loop: "{{ flux_ops_app_repos }}"
          changed_when: false
          no_log: true

        - name: Push FLUX_OPS_APP_PRIVATE_KEY to each app repo
          ansible.builtin.shell: |
            gh secret set FLUX_OPS_APP_PRIVATE_KEY \
              --repo "{{ item }}" < "{{ pem_tmpdir.path }}/key.pem"
          loop: "{{ flux_ops_app_repos }}"
          changed_when: false
          no_log: true

        - name: Verify secrets landed (list without values)
          ansible.builtin.command:
            argv:
              - gh
              - secret
              - list
              - --repo
              - "{{ item }}"
          loop: "{{ flux_ops_app_repos }}"
          register: repo_secret_list
          changed_when: false

        - name: Assert each app repo has both FLUX_OPS_APP secrets
          ansible.builtin.assert:
            that:
              - "'FLUX_OPS_APP_ID' in item.stdout"
              - "'FLUX_OPS_APP_PRIVATE_KEY' in item.stdout"
            fail_msg: >
              Repo {{ item.item }} is missing one or both FLUX_OPS_APP_* secrets.
              register.yaml in that repo will fail at the
              actions/create-github-app-token step.
            success_msg: "{{ item.item }} has both FLUX_OPS_APP_* secrets"
          loop: "{{ repo_secret_list.results }}"
          loop_control:
            label: "{{ item.item }}"
      always:
        - name: Remove temporary PEM file
          ansible.builtin.file:
            path: "{{ pem_tmpdir.path }}"
            state: absent
          when: pem_tmpdir.path is defined

    # ================================================================
    # resume-site — Gemini API key
    #
    # The app also has a Cerebras code path (backend/ai/llm.py) but most
    # models we used are no longer free on that provider, so we ship with
    # CEREBRAS_API_KEY unset and let the `if CEREBRAS_API_KEY:` gate in
    # llm.py skip that branch. Gemini handles both embeddings and LLM
    # calls on its own. If you later re-introduce Cerebras, add
    # vault_cerebras_api_key to vault.yml and an extra --from-literal
    # line below.
    # ================================================================
    - name: resume-site — seed API-key secret
      tags: [resume-site, all]
      block:
        - name: Ensure resume-site namespace exists
          ansible.builtin.command: >
            kubectl create namespace resume-site --dry-run=client -o yaml
          register: rs_ns_yaml
          environment:
            KUBECONFIG: "{{ kubeconfig }}"
          changed_when: false

        - name: Apply resume-site namespace
          ansible.builtin.command: kubectl apply -f -
          args:
            stdin: "{{ rs_ns_yaml.stdout }}"
          environment:
            KUBECONFIG: "{{ kubeconfig }}"
          changed_when: false

        # Key name matches the env var the app expects. The Deployment
        # uses envFrom: secretRef, so keys become env vars verbatim
        # (GEMINI_API_KEY → $GEMINI_API_KEY).
        - name: Create/update resume-site-secrets
          ansible.builtin.shell: |
            kubectl create secret generic resume-site-secrets \
              --from-literal=GEMINI_API_KEY="{{ vault_gemini_api_key }}" \
              -n resume-site \
              --dry-run=client -o yaml | kubectl apply -f -
          environment:
            KUBECONFIG: "{{ kubeconfig }}"
          changed_when: false
          no_log: true

        - name: Verify resume-site-secrets has required keys
          ansible.builtin.command: >
            kubectl get secret resume-site-secrets -n resume-site
            -o jsonpath={.data}
          environment:
            KUBECONFIG: "{{ kubeconfig }}"
          changed_when: false
          register: rs_secret_check

        - name: Assert resume-site-secrets key shape
          ansible.builtin.assert:
            that:
              - "'GEMINI_API_KEY' in rs_secret_check.stdout"
            fail_msg: >
              resume-site-secrets is missing GEMINI_API_KEY. The app will
              return 401 from its LLM calls and fail embeddings generation.
            success_msg: "resume-site-secrets has GEMINI_API_KEY"
