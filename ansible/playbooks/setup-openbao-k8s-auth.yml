---
# setup-openbao-k8s-auth.yml — Wire OpenBao's kubernetes auth method
# into the grizzly-platform cluster so External Secrets Operator can pull
# platform secrets.
#
# The ESO workflow:
#   ESO pod authenticates → presents its ServiceAccount JWT to OpenBao
#   OpenBao validates JWT → calls TokenReview on the cluster using
#   the "reviewer" JWT from this playbook → if OK, grants a short-lived
#   OpenBao token scoped to the eso-platform-read policy.
#
# Prerequisites:
#   - bootstrap-openbao.yml run successfully (AppRole + policies exist)
#   - k8s cluster up and reachable from the controller via kubectl
#   - `openbao-auth` SA + its token Secret exist in the external-secrets
#     namespace (applied either imperatively at the top of this playbook
#     or reconciled by Flux from kubernetes/infrastructure/external-secrets/)
#
# Usage (initial setup):
#   ansible-playbook ansible/playbooks/setup-openbao-k8s-auth.yml \
#     --vault-password-file .vault_pass
#
# Usage (rotate the reviewer-JWT — via rotate-openbao-keys.yml):
#   ansible-playbook ansible/playbooks/rotate-openbao-keys.yml \
#     --tags k8s-auth-jwt --vault-password-file .vault_pass
#
# Idempotent: all `bao write` calls are upserts; kubectl apply is
# idempotent; the Secret token is read each run (K8s generates it once
# on Secret creation and re-uses it until the Secret is deleted).

- name: Configure OpenBao Kubernetes auth for in-cluster consumers
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/all/vault.yml"
    - "{{ playbook_dir }}/../inventory/group_vars/all/vars.yml"
    - "{{ playbook_dir }}/../roles/r730xd-openbao/defaults/main.yml"

  vars:
    kubeconfig: "{{ lookup('env', 'KUBECONFIG') | default(lookup('env', 'HOME') ~ '/.kube/config', true) }}"
    eso_namespace: "external-secrets"
    openbao_auth_sa: "openbao-auth"
    openbao_auth_token_secret: "openbao-auth-token"
    # Admin token: pulled from Infisical at play time. The universal-auth
    # creds needed to reach Infisical come from the Ansible vault.
    infisical_auth_env:
      INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: "{{ vault_infisical_openbao_client_id }}"
      INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: "{{ vault_infisical_openbao_client_secret }}"

  pre_tasks:
    - name: Assert prerequisites
      ansible.builtin.assert:
        that:
          - vault_infisical_openbao_client_id is defined
          - vault_infisical_openbao_client_id | length > 0
          - vault_infisical_openbao_client_secret is defined
        fail_msg: >
          Infisical bootstrap credentials missing from vault.yml; run
          scripts/set-openbao-bootstrap-secrets.sh first.

    - name: Verify required CLIs are on PATH
      ansible.builtin.command: "which {{ item }}"
      loop:
        - kubectl
        - bao
        - infisical
      changed_when: false
      register: cli_versions

  tasks:
    # ------------------------------------------------------------------
    # 1. Apply the K8s-side wiring (namespace + SA + CRB + token Secret).
    #    Running this here lets the playbook bootstrap a cluster where
    #    Flux hasn't yet picked up kubernetes/infrastructure/external-
    #    secrets/. Re-running after Flux adopts them is a no-op.
    # ------------------------------------------------------------------
    - name: Apply external-secrets namespace + openbao-auth SA + token Secret
      ansible.builtin.command:
        argv:
          - kubectl
          - apply
          - -k
          - "{{ playbook_dir }}/../../kubernetes/infrastructure/external-secrets"
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: k8s_apply
      changed_when: "'configured' in k8s_apply.stdout or 'created' in k8s_apply.stdout"

    # ------------------------------------------------------------------
    # 2. Wait for K8s to populate the token + ca.crt into the Secret.
    # ------------------------------------------------------------------
    - name: Wait for openbao-auth-token Secret to be populated
      ansible.builtin.command:
        argv:
          - kubectl
          - -n
          - "{{ eso_namespace }}"
          - get
          - secret
          - "{{ openbao_auth_token_secret }}"
          - -o
          - jsonpath={.data.token}
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: sa_token_b64
      changed_when: false
      retries: 12
      delay: 5
      until: sa_token_b64.stdout | length > 0

    - name: Extract reviewer JWT (b64-decoded)
      ansible.builtin.set_fact:
        reviewer_jwt: "{{ sa_token_b64.stdout | b64decode }}"
      no_log: true

    - name: Read cluster CA from the same Secret
      ansible.builtin.command:
        argv:
          - kubectl
          - -n
          - "{{ eso_namespace }}"
          - get
          - secret
          - "{{ openbao_auth_token_secret }}"
          - -o
          - jsonpath={.data.ca\.crt}
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: cluster_ca_b64
      changed_when: false

    - name: Decode cluster CA
      ansible.builtin.set_fact:
        cluster_ca_pem: "{{ cluster_ca_b64.stdout | b64decode }}"

    - name: Resolve current kubectl cluster server URL
      ansible.builtin.command:
        argv:
          - kubectl
          - config
          - view
          - --minify
          - -o
          - jsonpath={.clusters[0].cluster.server}
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: cluster_server
      changed_when: false

    # ------------------------------------------------------------------
    # 3. Fetch the OpenBao root token from Infisical (same mechanism as
    #    auto-unseal; see docs/decisions/023).
    # ------------------------------------------------------------------
    - name: Fetch OpenBao root token from Infisical
      ansible.builtin.command:
        argv:
          - infisical
          - secrets
          - get
          - "{{ openbao_infisical_root_token_key }}"
          - "--projectId={{ openbao_infisical_project_id }}"
          - "--env={{ openbao_infisical_env }}"
          - --plain
          - --silent
      environment: "{{ infisical_auth_env }}"
      register: openbao_root
      changed_when: false
      no_log: true

    - name: Capture root token
      ansible.builtin.set_fact:
        openbao_root_token: "{{ openbao_root.stdout | trim }}"
      no_log: true

    # ------------------------------------------------------------------
    # 4. Configure OpenBao kubernetes auth method.
    # ------------------------------------------------------------------
    - name: Fetch OpenBao auth method list
      ansible.builtin.command:
        argv: [bao, auth, list, -format=json]
      environment: &bao_env
        VAULT_ADDR: "{{ openbao_api_addr }}"
        VAULT_CACERT: "{{ openbao_tls_ca_path | default('/etc/openbao/tls/ca.crt') }}"
        BAO_ADDR: "{{ openbao_api_addr }}"
        BAO_CACERT: "{{ openbao_tls_ca_path | default('/etc/openbao/tls/ca.crt') }}"
        VAULT_TOKEN: "{{ openbao_root_token }}"
        BAO_TOKEN: "{{ openbao_root_token }}"
      register: auth_list
      changed_when: false
      no_log: true

    - name: Enable kubernetes auth method
      ansible.builtin.command:
        argv: [bao, auth, enable, kubernetes]
      environment: *bao_env
      when: "'kubernetes/' not in (auth_list.stdout | from_json | default({}))"
      register: k8s_auth_enable
      changed_when: "'Success' in k8s_auth_enable.stdout"
      failed_when:
        - k8s_auth_enable.rc != 0
        - "'path is already in use' not in (k8s_auth_enable.stderr | default(''))"
      no_log: true

    - name: Write cluster CA to a tmp file (for @-loading)
      ansible.builtin.copy:
        dest: "/tmp/openbao-k8s-ca.crt"
        content: "{{ cluster_ca_pem }}"
        mode: "0600"
      no_log: true

    - name: Write reviewer JWT to a tmp file (for @-loading)
      ansible.builtin.copy:
        dest: "/tmp/openbao-k8s-reviewer.jwt"
        content: "{{ reviewer_jwt }}"
        mode: "0600"
      no_log: true

    - name: Configure kubernetes auth (host / CA / reviewer JWT)
      ansible.builtin.command:
        argv:
          - bao
          - write
          - auth/kubernetes/config
          - "kubernetes_host={{ cluster_server.stdout }}"
          - "kubernetes_ca_cert=@/tmp/openbao-k8s-ca.crt"
          - "token_reviewer_jwt=@/tmp/openbao-k8s-reviewer.jwt"
          - "disable_iss_validation=true"
      environment: *bao_env
      register: k8s_auth_config
      changed_when: "'Success' in k8s_auth_config.stdout"
      no_log: true

    - name: Create external-secrets role → eso-platform-read policy
      ansible.builtin.command:
        argv:
          - bao
          - write
          - auth/kubernetes/role/external-secrets
          - "bound_service_account_names=external-secrets"
          - "bound_service_account_namespaces={{ eso_namespace }}"
          - "policies=eso-platform-read"
          - "token_ttl=1h"
          - "token_max_ttl=4h"
      environment: *bao_env
      register: k8s_role_write
      changed_when: "'Success' in k8s_role_write.stdout"
      no_log: true

    - name: Clean up tmp files
      ansible.builtin.file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/openbao-k8s-ca.crt
        - /tmp/openbao-k8s-reviewer.jwt

    # ------------------------------------------------------------------
    # 5. Smoke-test the auth method so we know the reviewer JWT works.
    # ------------------------------------------------------------------
    - name: Smoke-test — read auth/kubernetes/config back
      ansible.builtin.command:
        argv: [bao, read, auth/kubernetes/config]
      environment: *bao_env
      register: k8s_auth_verify
      changed_when: false
      no_log: true

    - name: Assert auth/kubernetes/config reflects our settings
      ansible.builtin.assert:
        that:
          - cluster_server.stdout in k8s_auth_verify.stdout
        fail_msg: >
          auth/kubernetes/config did not read back with the expected
          host. Check OpenBao audit log + `bao read auth/kubernetes/config`.

    - name: Summary
      ansible.builtin.debug:
        msg:
          - "=== OpenBao Kubernetes auth configured ==="
          - "host:   {{ cluster_server.stdout }}"
          - "role:   external-secrets (SA external-secrets:{{ eso_namespace }})"
          - "policy: eso-platform-read"
          - ""
          - "Next: Phase D — deploy ESO HelmRelease + ClusterSecretStore"
          - "      + ExternalSecret manifests under"
          - "      kubernetes/infrastructure/external-secrets/"
