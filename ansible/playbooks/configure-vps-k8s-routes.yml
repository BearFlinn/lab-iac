---
# Configure VPS Caddy for Kubernetes Service Routing
#
# This playbook configures the VPS reverse proxy to route traffic to
# Kubernetes services via NetBird tunnel.
#
# Prerequisites:
#   - NetBird tunnel established between VPS and k8s-control
#   - K8s ingress controller running and accessible
#   - NetBird firewall rules fixed on k8s-control (run fix-netbird-k8s-forwarding.sh)
#   - Ansible vault configured with cloudflare_api_token
#
# Usage:
#   ansible-playbook -i ansible/inventory/proxy-vps.yml \
#     ansible/playbooks/configure-vps-k8s-routes.yml --ask-vault-pass

- name: Configure VPS for K8s Service Routing
  hosts: all
  become: yes

  vars_files:
    - ../group_vars/all/vars.yml
    - ../group_vars/all/vault.yml

  vars:
    # Caddy DNS-01 challenge configuration
    caddy_dns_provider: "cloudflare"
    caddy_email: "bearflinn@gmail.com"

    # K8s control plane NetBird IP and ingress NodePort
    k8s_netbird_ip: "100.96.94.27"
    k8s_ingress_nodeport: "30487"
    k8s_ingress_endpoint: "{{ k8s_netbird_ip }}:{{ k8s_ingress_nodeport }}"

    # Services to route
    k8s_services:
      - domain: "landing.bearflinn.com"
        enabled: true
      - domain: "zork.bearflinn.com"
        enabled: true
      - domain: "resume.bearflinn.com"
        enabled: true
      - domain: "coaching.bearflinn.com"
        enabled: true
      - domain: "family-dashboard.bearflinn.com"
        enabled: true
    
    # Existing non-k8s services to preserve
    existing_services:
      - domain: "gin-house.bearflinn.com"
        backend: "100.96.217.175:8123"
        comment: "Home Assistant via Tailscale"
      - domain: "test.bearflinn.com"
        type: "static"
        root: "/var/www/html"
        comment: "Static test site"
  
  tasks:
    - name: Verify NetBird connectivity to k8s
      ansible.builtin.wait_for:
        host: "{{ k8s_netbird_ip }}"
        port: "{{ k8s_ingress_nodeport }}"
        timeout: 10
      register: netbird_check
      failed_when: false
    
    - name: Warn if k8s ingress not reachable
      ansible.builtin.debug:
        msg: |
          WARNING: Cannot reach k8s ingress at {{ k8s_ingress_endpoint }}
          Make sure:
            1. NetBird tunnel is established
            2. NetBird firewall fix applied on k8s-control
            3. Ingress controller is running
      when: netbird_check.failed | default(false)

    # =========================================================================
    # CADDY WITH CLOUDFLARE DNS MODULE
    # Required for DNS-01 challenge when behind Cloudflare proxy
    # =========================================================================

    - name: Check if Caddy has Cloudflare DNS module
      ansible.builtin.command: caddy list-modules
      register: caddy_modules
      changed_when: false
      failed_when: false

    - name: Build Caddy with Cloudflare DNS module
      when: "'dns.providers.cloudflare' not in caddy_modules.stdout"
      block:
        - name: Install build dependencies
          ansible.builtin.apt:
            name:
              - golang-go
              - git
            state: present

        - name: Check if xcaddy is installed
          ansible.builtin.stat:
            path: /usr/local/bin/xcaddy
          register: xcaddy_binary

        - name: Install xcaddy
          when: not xcaddy_binary.stat.exists
          block:
            - name: Download and install xcaddy
              ansible.builtin.shell: |
                go install github.com/caddyserver/xcaddy/cmd/xcaddy@latest
              environment:
                GOPATH: /tmp/go
                GO111MODULE: "on"

            - name: Move xcaddy to /usr/local/bin
              ansible.builtin.copy:
                src: /tmp/go/bin/xcaddy
                dest: /usr/local/bin/xcaddy
                mode: '0755'
                remote_src: yes

            - name: Clean up Go cache
              ansible.builtin.file:
                path: /tmp/go
                state: absent

        - name: Build Caddy with Cloudflare DNS plugin
          ansible.builtin.shell: |
            /usr/local/bin/xcaddy build \
              --output /tmp/caddy-cloudflare \
              --with github.com/caddy-dns/cloudflare
          args:
            creates: /tmp/caddy-cloudflare

        - name: Stop Caddy service before replacing binary
          ansible.builtin.systemd:
            name: caddy
            state: stopped

        - name: Backup original Caddy binary
          ansible.builtin.copy:
            src: /usr/bin/caddy
            dest: /usr/bin/caddy.backup
            mode: '0755'
            remote_src: yes
          ignore_errors: yes

        - name: Replace Caddy binary with Cloudflare-enabled build
          ansible.builtin.copy:
            src: /tmp/caddy-cloudflare
            dest: /usr/bin/caddy
            mode: '0755'
            owner: root
            group: root
            remote_src: yes

        - name: Set CAP_NET_BIND_SERVICE capability on Caddy binary
          community.general.capabilities:
            path: /usr/bin/caddy
            capability: cap_net_bind_service=+ep
            state: present

        - name: Clean up build artifact
          ansible.builtin.file:
            path: /tmp/caddy-cloudflare
            state: absent

        - name: Verify Caddy build includes Cloudflare module
          ansible.builtin.command: /usr/bin/caddy list-modules
          register: caddy_verify
          changed_when: false
          failed_when: "'dns.providers.cloudflare' not in caddy_verify.stdout"

    # =========================================================================
    # SYSTEMD OVERRIDE FOR CLOUDFLARE API TOKEN
    # =========================================================================

    - name: Create systemd override directory
      ansible.builtin.file:
        path: /etc/systemd/system/caddy.service.d
        state: directory
        mode: '0755'

    - name: Deploy systemd override with Cloudflare API token
      ansible.builtin.template:
        src: ../roles/caddy/templates/caddy-override.conf.j2
        dest: /etc/systemd/system/caddy.service.d/override.conf
        mode: '0600'
      notify: restart caddy

    - name: Reload systemd daemon
      ansible.builtin.systemd:
        daemon_reload: yes

    # =========================================================================
    # CADDY CONFIGURATION
    # =========================================================================

    - name: Create Caddy log directory
      ansible.builtin.file:
        path: /var/log/caddy
        state: directory
        owner: caddy
        group: caddy
        mode: '0755'
    
    - name: Create k8s-access.log with proper permissions
      ansible.builtin.file:
        path: /var/log/caddy/k8s-access.log
        state: touch
        owner: caddy
        group: caddy
        mode: '0644'
        modification_time: preserve
        access_time: preserve
    
    - name: Deploy Caddyfile for K8s routing
      ansible.builtin.template:
        src: ../templates/Caddyfile-k8s-netbird.j2
        dest: /etc/caddy/Caddyfile
        owner: caddy
        group: caddy
        mode: '0644'
        # Note: Skipping validate because it requires CLOUDFLARE_API_TOKEN env var
        # which is only available at runtime via systemd
        backup: yes
      notify: restart caddy
    
    - name: Ensure Caddy service is running
      ansible.builtin.systemd:
        name: caddy
        state: started
        enabled: yes
  
  handlers:
    - name: reload caddy
      ansible.builtin.systemd:
        name: caddy
        state: reloaded

    - name: restart caddy
      ansible.builtin.systemd:
        name: caddy
        state: restarted
        daemon_reload: yes
