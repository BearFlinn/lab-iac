---
# Configure VPS Caddy for Kubernetes Service Routing
#
# This playbook configures the VPS reverse proxy to route traffic to
# Kubernetes services via NetBird tunnel.
#
# Prerequisites:
#   - NetBird tunnel established between VPS and k8s-control
#   - K8s ingress controller running and accessible
#   - NetBird firewall rules fixed on k8s-control (run fix-netbird-k8s-forwarding.sh)
#
# Usage:
#   ansible-playbook -i ansible/inventory/proxy-vps.yml \
#     ansible/playbooks/configure-vps-k8s-routes.yml

- name: Configure VPS for K8s Service Routing
  hosts: all
  become: yes
  
  vars:
    # K8s control plane NetBird IP and ingress NodePort
    k8s_netbird_ip: "100.96.94.27"
    k8s_ingress_nodeport: "30487"
    k8s_ingress_endpoint: "{{ k8s_netbird_ip }}:{{ k8s_ingress_nodeport }}"
    
    # Services to route
    k8s_services:
      - domain: "landing.bearflinn.com"
        enabled: true
      - domain: "zork.bearflinn.com"
        enabled: true
      - domain: "resume.bearflinn.com"
        enabled: true
      - domain: "coaching.bearflinn.com"
        enabled: true
      - domain: "family.bearflinn.com"
        enabled: true
    
    # Existing non-k8s services to preserve
    existing_services:
      - domain: "gin-house.bearflinn.com"
        backend: "100.96.217.175:8123"
        comment: "Home Assistant via Tailscale"
      - domain: "test.bearflinn.com"
        type: "static"
        root: "/var/www/html"
        comment: "Static test site"
  
  tasks:
    - name: Verify NetBird connectivity to k8s
      ansible.builtin.wait_for:
        host: "{{ k8s_netbird_ip }}"
        port: "{{ k8s_ingress_nodeport }}"
        timeout: 10
      register: netbird_check
      failed_when: false
    
    - name: Warn if k8s ingress not reachable
      ansible.builtin.debug:
        msg: |
          WARNING: Cannot reach k8s ingress at {{ k8s_ingress_endpoint }}
          Make sure:
            1. NetBird tunnel is established
            2. NetBird firewall fix applied on k8s-control
            3. Ingress controller is running
      when: netbird_check.failed | default(false)
    
    - name: Create Caddy log directory
      ansible.builtin.file:
        path: /var/log/caddy
        state: directory
        owner: caddy
        group: caddy
        mode: '0755'
    
    - name: Create k8s-access.log with proper permissions
      ansible.builtin.file:
        path: /var/log/caddy/k8s-access.log
        state: touch
        owner: caddy
        group: caddy
        mode: '0644'
        modification_time: preserve
        access_time: preserve
    
    - name: Deploy Caddyfile for K8s routing
      ansible.builtin.template:
        src: ../templates/Caddyfile-k8s-netbird.j2
        dest: /etc/caddy/Caddyfile
        owner: caddy
        group: caddy
        mode: '0644'
        validate: 'caddy validate --adapter caddyfile --config %s'
        backup: yes
      notify: reload caddy
    
    - name: Ensure Caddy service is running
      ansible.builtin.systemd:
        name: caddy
        state: started
        enabled: yes
  
  handlers:
    - name: reload caddy
      ansible.builtin.systemd:
        name: caddy
        state: reloaded
