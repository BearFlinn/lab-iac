---
# Kubernetes cluster configuration — shared across control plane and workers
# CIDRs per ADR-014, dual-stack per k8s-containerd sysctl setup
# IP addresses: see ansible/group_vars/all/network.yml (single source of truth)

# Kubernetes minor version — latest patch installed automatically
kubernetes_version: "1.33"

# Pod network CIDRs (dual-stack)
k8s_pod_cidr_v4: "10.244.0.0/16"
k8s_pod_cidr_v6: "fd00:10:244::/48"

# Service CIDRs (dual-stack)
k8s_service_cidr_v4: "10.96.0.0/12"
k8s_service_cidr_v6: "fd00:10:96::/112"
