---
# Compute Nodes Inventory - Master File
# Aggregates all compute node devices with grouping and common configuration
#
# Individual device configs are in: ansible/inventory/compute-nodes/
#
# Usage:
#   ansible-playbook -i inventory/homelab.yml playbooks/your-playbook.yml

all:
  children:
    workstations:
      description: "High-performance computing devices"
      hosts:
        tower-pc:
        msi-laptop:

    servers:
      description: "Server-class devices"
      hosts:
        dell-optiplex-9020:

    lightweight:
      description: "Lightweight devices for edge computing and testing"
      hosts:
        dell-inspiron-15:

  # Common variables for all hosts
  vars:
    ansible_python_interpreter: /usr/bin/python3
    ansible_become: yes
    ansible_become_method: sudo

  # Grouping by capability
  compute_nodes:
    children:
      - workstations
      - servers

  gpu_enabled:
    hosts:
      tower-pc:
      msi-laptop:

  high_memory:
    hosts:
      tower-pc:
      msi-laptop:
      dell-optiplex-9020:

  high_storage:
    hosts:
      tower-pc:

  kubernetes_candidates:
    hosts:
      tower-pc:
      msi-laptop:
      dell-optiplex-9020:
    vars:
      k8s_capable: true
