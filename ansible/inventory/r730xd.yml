---
# Dell R730xd — Standalone Storage Server
# Use this inventory for R730xd-specific playbooks
# IP addresses: see ansible/group_vars/all/network.yml (single source of truth)
#
# Usage:
#   ansible-playbook -i ansible/inventory/r730xd.yml ansible/playbooks/setup-r730xd.yml -v
#   ansible-playbook -i ansible/inventory/r730xd.yml ansible/playbooks/r730xd-storage.yml \
#     --vault-password-file .vault_pass -v

all:
  hosts:
    r730xd:
      ansible_host: "{{ r730xd_ip }}"
      ansible_connection: ssh
      ansible_user: bearf
      # Hardware specs
      cpu: "Intel Xeon E5-2630 v3 (8C/16T @ 2.4 GHz)"
      cpu_cores: 8
      cpu_threads: 16
      ram: "32GB"
      ram_gb: 32
      form_factor: "2U Rackmount"
      model: "Dell PowerEdge R730xd"
      node_roles: ["storage"]

      # NFS server metrics — enables nfsd collector in node-exporter
      node_exporter_nfsd_enabled: true

      # iDRAC connection (used by r730xd-storage.yml to resolve drive bays)
      idrac_host: "{{ r730xd_idrac_ip }}"

      # Drive bay assignments — source of truth for all storage roles
      # Bay 12 (rear 2.5") is the boot SSD, excluded automatically
      # role: parity | data
      r730xd_drive_bays:
        - bay: 0
          role: parity       # 4TB — must be >= largest data drive
        - bay: 1
          role: data         # 3TB
        - bay: 2
          role: data         # 3TB
        - bay: 3
          role: parity       # 4TB
        - bay: 4
          role: data         # 3TB
        - bay: 5
          role: data         # 3TB
        - bay: 8
          role: data         # 3TB (existing data — not wiped)
        - bay: 9
          role: zfs          # 2TB — migrated from tower-pc
        - bay: 10
          role: zfs          # 2TB — migrated from tower-pc
        - bay: 11
          role: zfs          # 2TB — migrated from tower-pc

  vars:
    network_dns: "{{ lab_dns }}"
    timezone: "America/New_York"
    enable_firewall: false
    idrac_password: "{{ vault_idrac_password }}"
