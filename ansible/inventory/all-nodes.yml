---
# Kubernetes Cluster - Master Inventory
# Single source of truth for all cluster nodes
# Use this for multi-node operations (baseline-setup, setup-workers, etc.)
#
# For single-machine setup, create a minimal inventory with just that host.
# See ansible/inventory/single-host/README.md for instructions.

all:
  vars:
    # Network configuration (auto-detected if not specified)
    # network_gateway: "10.0.0.1"  # Auto-detected from current gateway
    network_dns:
      - "8.8.8.8"
      - "8.8.4.4"
    # Timezone
    timezone: "America/New_York"  # Adjust to your timezone
    # Firewall (set to true if you want ufw enabled)
    enable_firewall: false  # Recommended: false for dev/test K8s clusters
    # Add all nodes to /etc/hosts on each machine
    add_hosts_file: true

  children:
    k8s_control_plane:
      hosts:
        dell-inspiron-15:
          ansible_host: 10.0.0.226
          ansible_connection: ssh
          ansible_user: bearf
          network_interface: enp2s0
          # Hardware specs
          cpu: "Intel i3-7100U (2 cores, 4 threads @ 2.7 GHz)"
          cpu_cores: 2
          cpu_threads: 4
          ram: "8GB"
          ram_gb: 8
          storage:
            - name: "SSD"
              capacity: "256GB"
              capacity_gb: 256
              type: "SSD"
          total_storage_gb: 256
          form_factor: "Laptop"
          model: "Dell Inspiron 15-3567"
          roles: ["control-plane"]

    k8s_workers:
      hosts:
        tower-pc:
          ansible_host: 10.0.0.249
          ansible_connection: ssh
          ansible_user: bearf
          network_interface: eno1
          # Hardware specs
          cpu: "Intel i7-4790 (4 cores, 8 threads @ 3.6-4.0 GHz)"
          cpu_cores: 4
          cpu_threads: 8
          ram: "24GB"
          ram_gb: 24
          gpu: "NVIDIA GTX 1060"
          gpu_memory_gb: 3
          storage:
            - name: "M.2 SSD | sdh"
              capacity: "128GB"
              capacity_gb: 128
              type: "NVMe"
              device: "/dev/sdh"
              purpose: "bcache backing device"
            - name: "SATA SSD | sda"
              capacity: "240GB"
              capacity_gb: 240
              type: "SSD"
              device: "/dev/sda"
              purpose: "OS drive"
            - name: "HDD 1 | sdb"
              capacity: "1TB"
              capacity_gb: 1000
              type: "HDD"
              device: "/dev/sdb"
              purpose: "NFS backing storage (backed by bcache)"
            - name: "HDD 3 | sdg"
              capacity: "2TB"
              capacity_gb: 2000
              type: "HDD"
              device: "/dev/sdg"
              purpose: "ZFS RAID-Z1 pool (part 1)"
            - name: "HDD 4 | sdi"
              capacity: "2TB"
              capacity_gb: 2000
              type: "HDD"
              device: "/dev/sdi"
              purpose: "ZFS RAID-Z1 pool (part 2)"
            - name: "HDD 5 | sdj"
              capacity: "2TB"
              capacity_gb: 2000
              type: "HDD"
              device: "/dev/sdj"
              purpose: "ZFS RAID-Z1 pool (part 3)"
          total_storage_gb: 6368
          form_factor: "Full Tower"
          roles: ["compute", "storage", "gpu-enabled"]
          use_cases: ["kubernetes", "ml-workloads", "media-encoding"]
          # Note: storage_config is in ansible/inventory/host_vars/tower-pc.yml

        msi-laptop:
          ansible_host: 10.0.0.177
          ansible_connection: ssh
          ansible_user: bearf
          network_interface: enp61s0
          # Hardware specs
          cpu: "Intel i7-6700HQ (4 cores, 8 threads @ 2.6-3.5 GHz)"
          cpu_cores: 4
          cpu_threads: 8
          ram: "32GB"
          ram_gb: 32
          gpu: "NVIDIA GTX 1060"
          gpu_memory_gb: 3
          storage:
            - name: "SSD"
              capacity: "1TB"
              capacity_gb: 1000
              type: "SSD"
            - name: "HDD"
              capacity: "1TB"
              capacity_gb: 1000
              type: "HDD"
          total_storage_gb: 2000
          form_factor: "Laptop"
          model: "MSI GS43VR 6RE Phantom Pro"
          roles: ["compute", "gpu-enabled", "portable", "monitoring", "observability"]
          use_cases: ["development", "testing", "remote-deployment"]

        # Temporarily disabled - migrating services before adding to cluster
        # dell-optiplex-9020:
        #   ansible_host: 10.0.0.XXX  # Update with current IP
        #   # static_ip: 10.0.0.XXX  # Optional: uncomment to set a specific static IP
        #   ansible_connection: ssh
        #   ansible_user: bearf  # Update if different
        #   # Specs
        #   cpu: "Intel i7-4790 (4 cores, 8 threads)"
        #   cpu_cores: 4
        #   cpu_threads: 8
        #   ram: "32GB"
        #   ram_gb: 32
        #   storage:
        #     - name: "SSD"
        #       capacity: "512GB"
        #       type: "SSD"
        #   total_storage_gb: 512
        #   roles: ["compute", "general"]

    k8s_cluster:
      children:
        k8s_control_plane:
        k8s_workers:
