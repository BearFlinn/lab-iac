---
# Kubernetes Control Plane Inventory
# Dell Inspiron 15 serving as the single control plane node
# Use this inventory for control-plane-only operations (initial setup, verification, etc.)

all:
  children:
    k8s_control_plane:
      hosts:
        dell-inspiron-15:
          ansible_host: 10.0.0.226
          ansible_connection: ssh
          ansible_user: bearf
          # Specs
          cpu: "Intel i3-7100U (2 cores, 4 threads @ 2.7 GHz)"
          cpu_cores: 2
          cpu_threads: 4
          ram: "8GB"
          ram_gb: 8
          # Storage
          storage:
            - name: "SSD"
              capacity: "256GB"
              capacity_gb: 256
              type: "SSD"
          total_storage_gb: 256
          form_factor: "Laptop"
          model: "Dell Inspiron 15-3567"

    k8s_cluster:
      children:
        k8s_control_plane:
