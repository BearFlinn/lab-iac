---
# Tower PC Host-Specific Variables
# Storage configuration for tower-storage-setup playbook

storage_config:
  zfs_raid_z1:
    pool_name: "storage"
    devices:
      - "/dev/sdg"  # HDD 3 (2TB)
      - "/dev/sdi"  # HDD 4 (2TB)
      - "/dev/sdj"  # HDD 5 (2TB)
    filesystem: "storage/garage"
    capacity_usable_gb: 4000
    purpose: "Object storage (Garage/S3)"
    properties:
      compression: "lz4"
      atime: "off"
      checksum: "sha512"
  bcache:
    backing_device: "/dev/sdh"  # M.2 NVMe (128GB)
    purpose: "Performance cache layer for NFS"
  nfs:
    backing_device: "/dev/sdb"  # HDD 1 (1TB)
    export_path: "/mnt/nfs-storage"
    export_network: "10.0.0.0/24"
    purpose: "Kubernetes PersistentVolume provisioning with bcache acceleration"

# PostgreSQL Database Configuration
# External database server for k8s applications
postgresql_config:
  data_dir: "/mnt/nfs-storage/postgresql"
  backup_zfs_dataset: "storage/postgresql-backups"
  description: "Shared PostgreSQL instance for k8s applications"
  databases:
    - name: coaching
      owner: coaching_user
      description: "Coaching website database"
    - name: resume
      owner: resume_user
      description: "Resume site database"
    - name: family_dashboard
      owner: dashboard_user
      description: "Family dashboard database"
    - name: game_servers
      owner: game_servers_user
      description: "Game server platform database"

# PostgreSQL users (passwords in vault)
postgresql_users:
  - name: coaching_user
    password: "{{ vault_postgresql_coaching_user_password }}"
  - name: resume_user
    password: "{{ vault_postgresql_resume_user_password }}"
  - name: dashboard_user
    password: "{{ vault_postgresql_dashboard_user_password }}"
  - name: game_servers_user
    password: "{{ vault_postgresql_game_servers_user_password }}"

# Use values from postgresql_config
postgresql_databases: "{{ postgresql_config.databases }}"

# Garage S3 Object Storage Configuration
garage_config:
  data_dir: "/storage/garage"
  metadata_dir: "/var/lib/garage/meta"
  data_capacity: "4T"
  description: "S3-compatible object storage for backups and media"
  use_cases:
    - application_backups
    - media_storage
    - general_purpose_s3
