---
# Proxy VPS Inventory
# This server is configured with cloud-init (proxy-vps-1_cloud-init.yml)
# - SSH on port 2222
# - User: bearf
# - SSH key authentication only
# - UFW enabled with port 2222 allowed

all:
  hosts:
    proxy-vps-1:
      ansible_host: proxy-vps
      ansible_user: bearf
      ansible_port: 2222

      # Wildcard certificate configuration
      caddy_domain: "bearflinn.com"              # Root domain
      caddy_wildcard_domain: "*.bearflinn.com"   # Wildcard subdomain
      caddy_email: "bearflinn@gmail.com"
      enable_caddy: true

      # Enable DNS-01 challenge with Cloudflare
      caddy_dns_provider: "cloudflare"
      caddy_use_wildcard: true

      # Kubernetes cluster proxy configuration
      enable_k8s_proxy: true

      # K8s cluster endpoints (internal network)
      k8s_api_server: "10.0.0.226:6443"
      k8s_ingress_service_name: "nginx-ingress-controller"
      k8s_ingress_namespace: "ingress-nginx"

      # Proxy routing - Map external domains to internal k8s services
      k8s_proxy_routes:
        # Example: route api.bearflinn.com to k8s API server
        - domain: "api.bearflinn.com"
          type: "k8s_api"
          backend: "{{ k8s_api_server }}"
          skip_verify: true  # For self-signed certs, can be overridden

        # Route gin-house.bearflinn.com to Home Assistant via Tailscale
        - domain: "gin-house.bearflinn.com"
          type: "k8s_api"
          backend: "100.96.217.175:8123"
          skip_verify: true

        # Example: route app subdomains to k8s ingress
        - domain: "app.bearflinn.com"
          type: "k8s_ingress"
          backend_service: "app-service"
          backend_namespace: "default"
          backend_port: 80

        # Catch-all for other subdomains - proxy to ingress
        - domain: "*.bearflinn.com"
          type: "k8s_ingress"
          backend_service: "ingress-nginx-controller"
          backend_namespace: "ingress-nginx"
          backend_port: 80

  vars:
    # Timezone
    timezone: "UTC"

    # Firewall configuration
    enable_firewall: true

    # Additional UFW rules for web services
    ufw_web_rules:
      - { port: '80', proto: 'tcp', comment: 'HTTP' }
      - { port: '443', proto: 'tcp', comment: 'HTTPS' }
      - { port: '6443', proto: 'tcp', comment: 'K8s API Server' }
