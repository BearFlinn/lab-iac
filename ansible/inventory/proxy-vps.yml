---
# Proxy VPS Inventory
# Hetzner VPS running Caddy as reverse proxy to K8s cluster via NetBird tunnel
#
# SSH configured in ~/.ssh/config:
#   Host proxy-vps
#     HostName <vps-ip>
#     User bearf
#     Port 2222

all:
  hosts:
    proxy-vps-1:
      ansible_host: proxy-vps
      ansible_user: bearf
      ansible_port: 2222

      # =======================================================================
      # Caddy Configuration
      # =======================================================================
      enable_caddy: true
      caddy_email: "bearflinn@gmail.com"
      caddy_dns_provider: "cloudflare"

      # K8s proxy mode - routes traffic to K8s ingress via NetBird tunnel
      enable_k8s_proxy: true

      # K8s ingress endpoint (NetBird IP + NodePort)
      k8s_ingress_endpoint: "100.96.94.27:30487"

      # K8s services routed through ingress
      k8s_services:
        - domain: "landing.bearflinn.com"
          enabled: true
        - domain: "zork.bearflinn.com"
          enabled: true
        - domain: "resume.bearflinn.com"
          enabled: true
        - domain: "coaching.bearflinn.com"
          enabled: true
        - domain: "family-dashboard.bearflinn.com"
          enabled: true

      # Non-K8s services (static sites, other reverse proxies)
      caddy_services:
        - domain: "gin-house.bearflinn.com"
          type: "proxy"
          backend: "100.96.217.175:8123"
          comment: "Home Assistant via Tailscale"
        - domain: "test.bearflinn.com"
          type: "static"
          root: "/var/www/html"
          comment: "Static test site"

      # Root domain redirect
      caddy_root_domain: "bearflinn.com"
      caddy_root_redirect_target: "landing.bearflinn.com"

      # Wildcard catch-all (returns 404 for unconfigured subdomains)
      caddy_wildcard_catchall: "*.bearflinn.com"

  vars:
    # Timezone
    timezone: "UTC"

    # Firewall configuration
    enable_firewall: true

    # UFW rules
    ufw_web_rules:
      - { port: '80', proto: 'tcp', comment: 'HTTP' }
      - { port: '443', proto: 'tcp', comment: 'HTTPS' }
