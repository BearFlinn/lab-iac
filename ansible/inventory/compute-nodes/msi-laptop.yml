---
# MSI GS43VR 6RE Phantom Pro
# High-performance portable workstation with GPU

all:
  hosts:
    msi-laptop:
      ansible_host: 10.0.0.177
      ansible_connection: ssh
      ansible_user: bearf
      # Specs
      cpu: "Intel i7-6700HQ (4 cores, 8 threads @ 2.6-3.5 GHz)"
      cpu_cores: 4
      cpu_threads: 8
      ram: "32GB"
      ram_gb: 32
      gpu: "NVIDIA GTX 1060"
      gpu_memory_gb: 3
      # Storage
      storage:
        - name: "SSD"
          capacity: "1TB"
          capacity_gb: 1000
          type: "SSD"
        - name: "HDD"
          capacity: "1TB"
          capacity_gb: 1000
          type: "HDD"
      total_storage_gb: 2000
      form_factor: "Laptop"
      model: "MSI GS43VR 6RE Phantom Pro"
      roles: ["compute", "gpu-enabled", "portable"]
      use_cases: ["development", "testing", "remote-deployment"]
