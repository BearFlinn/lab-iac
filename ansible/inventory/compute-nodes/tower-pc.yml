---
# Full Tower PC
# Primary workstation with GPU and extensive storage

all:
  hosts:
    tower-pc:
      ansible_host: 10.0.0.249
      ansible_connection: ssh
      ansible_user: bearf
      # Specs
      cpu: "Intel i7-4790 (4 cores, 8 threads @ 3.6-4.0 GHz)"
      cpu_cores: 4
      cpu_threads: 8
      ram: "24GB"
      ram_gb: 24
      gpu: "NVIDIA GTX 1060"
      gpu_memory_gb: 3
      # Storage
      storage:
        - name: "M.2 SSD | sdh"
          capacity: "128GB"
          capacity_gb: 128
          type: "NVMe"
          device: "/dev/sdh"
          purpose: "bcache backing device (performance cache)"
        - name: "SATA SSD | sda"
          capacity: "240GB"
          capacity_gb: 240
          type: "SSD"
          device: "/dev/sda"
          purpose: "OS drive (not configured for storage pool)"
        - name: "HDD 1 | sdb"
          capacity: "1TB"
          capacity_gb: 1000
          type: "HDD"
          device: "/dev/sdb"
          purpose: "NFS backing storage (backed by bcache)"
        - name: "HDD 2" # REMOVE ME
          capacity: "1TB"
          capacity_gb: 1000
          type: "HDD"
          device: "NOT_ASSIGNED"
          purpose: "Marked for removal - not configured"
        - name: "HDD 3 | sdg"
          capacity: "2TB"
          capacity_gb: 2000
          type: "HDD"
          device: "/dev/sdg"
          purpose: "ZFS RAID-Z1 pool (part 1)"
        - name: "HDD 4 | sdi"
          capacity: "2TB"
          capacity_gb: 2000
          type: "HDD"
          device: "/dev/sdi"
          purpose: "ZFS RAID-Z1 pool (part 2)"
        - name: "HDD 5 | sdj"
          capacity: "2TB"
          capacity_gb: 2000
          type: "HDD"
          device: "/dev/sdj"
          purpose: "ZFS RAID-Z1 pool (part 3)"
      total_storage_gb: 9368
      form_factor: "Full Tower"
      roles: ["compute", "storage", "gpu-enabled"]
      use_cases: ["kubernetes", "ml-workloads", "media-encoding"]
      # Storage Configuration (for tower-storage-setup playbook)
      storage_config:
        zfs_raid_z1:
          pool_name: "storage"
          devices:
            - "/dev/sdg"  # HDD 3 (2TB)
            - "/dev/sdi"  # HDD 4 (2TB)
            - "/dev/sdj"  # HDD 5 (2TB)
          filesystem: "storage/garage"
          capacity_usable_gb: 4000
          purpose: "Object storage (Garage/S3)"
          properties:
            compression: "lz4"
            atime: "off"
            checksum: "sha512"
        bcache:
          backing_device: "/dev/sdh"  # M.2 NVMe (128GB)
          purpose: "Performance cache layer for NFS"
        nfs:
          backing_device: "/dev/sdb"  # HDD 1 (1TB)
          export_path: "/mnt/nfs-storage"
          export_network: "10.0.0.0/24"
          purpose: "Kubernetes PersistentVolume provisioning with bcache acceleration"
