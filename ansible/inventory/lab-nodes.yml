---
# Lab Node Inventory
# All physical lab machines on the 10.0.0.0/24 network
#
# Usage (target specific groups):
#   ansible-playbook -l k8s_cluster ansible/playbooks/some-playbook.yml
#   ansible -i ansible/inventory/lab-nodes.yml all -m ping
#
# Note: Quanta (10.0.0.201) is BMC/IPMI only — no OS installed yet.
# It will be added here once PXE boot is configured.

all:
  children:
    k8s_cluster:
      children:
        k8s_control_plane:
          hosts:
            dell-inspiron-15:
              ansible_host: 10.0.0.226
              model: "Dell Inspiron 15"
              cpu: "Intel i3-7100U (2C/4T @ 2.7 GHz)"
              ram_gb: 8
              node_roles: ["control-plane"]

        k8s_workers:
          hosts:
            tower-pc:
              ansible_host: 10.0.0.249
              model: "Custom Tower PC"
              cpu: "Intel i7-4790 (4C/8T @ 3.6-4.0 GHz)"
              ram_gb: 24
              node_roles: ["worker"]
              # To be freed: draining blocked until staging VM hosts critical workloads

    standalone:
      hosts:
        optiplex:
          ansible_host: 10.0.0.187
          model: "Dell Optiplex 9020 SFF"
          cpu: "Intel i7-4790 (4C/8T)"
          ram_gb: 32
          node_roles: ["standalone"]
          # To be freed: services must migrate before wiping and joining K8s

    storage_servers:
      hosts:
        r730xd:
          ansible_host: 10.0.0.200
          model: "Dell PowerEdge R730xd"
          cpu: "Intel Xeon E5-2630 v3 (8C/16T @ 2.4 GHz)"
          ram_gb: 32
          node_roles: ["storage", "vm-host"]

    # Temporary staging VM on R730xd — hosts critical workloads during migration
    # See ADR-002. Remove after migration Phase 5.
    # VM is on NAT network (192.168.122.x), reachable via R730xd jump host
    staging:
      hosts:
        staging-vm:
          ansible_host: 192.168.122.191
          ansible_ssh_common_args: '-o ProxyJump=bearf@10.0.0.200'
          node_roles: ["staging"]
          # Monitoring — VM has no IPMI/BMC or SMART-capable disks
          ipmi_exporter_enabled: false
          smartd_enabled: false
          monitoring_required_services:
            - "prometheus-node-exporter"
            - "docker"
          monitoring_optional_services: []

  vars:
    ansible_user: bearf
    ansible_connection: ssh
