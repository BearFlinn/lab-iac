---
# Lab Node Inventory
# All physical lab machines on the lab network
# IP addresses: see ansible/group_vars/all/network.yml (single source of truth)
#
# Usage (target specific groups):
#   ansible-playbook -l k8s_cluster ansible/playbooks/some-playbook.yml
#   ansible -i ansible/inventory/lab-nodes.yml all -m ping
#
# Note: Quanta BMC/IPMI is at <quanta_bmc_ip> (separate from OS IP below)

all:
  children:
    k8s_cluster:
      children:
        k8s_control_plane:
          hosts:
            dell-inspiron-15:
              ansible_host: "{{ dell_inspiron_ip }}"
              model: "Dell Inspiron 15"
              cpu: "Intel i3-7100U (2C/4T @ 2.7 GHz)"
              ram_gb: 8
              node_roles: ["control-plane"]
              ipmi_exporter_enabled: false

        k8s_workers:
          hosts:
            quanta:
              ansible_host: "{{ quanta_ip }}"
              model: "Quanta QSSC-2ML"
              cpu: "2x Intel Xeon E5-2670 (16C/32T @ 2.6 GHz)"
              ram_gb: 64
              bmc_host: "{{ quanta_bmc_ip }}"
              node_roles: ["worker"]

            intel-nuc:
              ansible_host: "{{ intel_nuc_ip }}"
              model: "Intel NUC12SNKi72"
              cpu: "Intel Core i7-12700H (14C/20T)"
              ram_gb: 64
              node_roles: ["worker"]
              ipmi_exporter_enabled: false
              # ARC GPU is dead — headless worker only

            tower-pc:
              ansible_host: "{{ tower_pc_ip }}"
              model: "Custom Tower PC"
              cpu: "Intel i7-4790 (4C/8T @ 3.6-4.0 GHz)"
              ram_gb: 24
              node_roles: ["worker"]
              # To be freed: draining blocked until staging VM hosts critical workloads

    standalone:
      hosts:
        optiplex:
          ansible_host: "{{ optiplex_ip }}"
          model: "Dell Optiplex 9020 SFF"
          cpu: "Intel i7-4790 (4C/8T)"
          ram_gb: 32
          node_roles: ["worker"]
          ipmi_exporter_enabled: false

    storage_servers:
      hosts:
        r730xd:
          ansible_host: "{{ r730xd_ip }}"
          model: "Dell PowerEdge R730xd"
          cpu: "Intel Xeon E5-2630 v3 (8C/16T @ 2.4 GHz)"
          ram_gb: 32
          node_roles: ["storage", "vm-host"]

    # Temporary staging VM on R730xd — hosts critical workloads during migration
    # See ADR-002. Remove after migration Phase 5.
    # VM is on NAT network, reachable via R730xd jump host
    staging:
      hosts:
        staging-vm:
          ansible_host: "{{ staging_vm_ip }}"
          ansible_ssh_common_args: '-o ProxyJump=bearf@{{ r730xd_ip }}'
          node_roles: ["staging"]
          # Monitoring — VM has no IPMI/BMC or SMART-capable disks
          ipmi_exporter_enabled: false
          smartd_enabled: false
          monitoring_required_services:
            - "prometheus-node-exporter"
            - "docker"
          monitoring_optional_services: []

  vars:
    ansible_user: bearf
    ansible_connection: ssh
