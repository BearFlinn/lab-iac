---
# r730xd-redis: Redis on Docker for foundation data store
# Persistent via AOF + RDB on ZFS pool (tank/foundation/redis, recordsize=64K)
#
# Connection: redis://:<password>@<r730xd_ip>:6379

# Image
redis_version: "7"
redis_image: "redis:{{ redis_version }}"

# Networking (host network mode — binds directly to host interface)
redis_port: 6379
redis_bind_address: "0.0.0.0"

# Directories
redis_data_dir: "/mnt/zfs/foundation/redis/data"
redis_compose_dir: "/opt/foundation/redis"

# Password (set via vault — see group_vars/all/vars.yml)
# redis_password: "{{ vault_redis_password }}"
# (inherited from group_vars/all/vars.yml)

# Memory management
redis_maxmemory: "2gb"
redis_maxmemory_policy: "allkeys-lru"

# Persistence — AOF
redis_appendonly: "yes"
redis_appendfsync: "everysec"

# Persistence — RDB snapshots
redis_save_rules:
  - seconds: 3600
    changes: 1
  - seconds: 300
    changes: 100
  - seconds: 60
    changes: 10000
