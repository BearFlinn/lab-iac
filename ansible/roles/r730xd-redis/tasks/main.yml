---
# r730xd-redis: Deploy Redis as a Docker Compose service

- name: Create Redis directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ redis_data_dir }}"
    - "{{ redis_compose_dir }}"

- name: Deploy Redis configuration
  ansible.builtin.template:
    src: redis.conf.j2
    dest: "{{ redis_compose_dir }}/redis.conf"
    owner: 999
    group: 999
    mode: "0400"
  no_log: true
  notify: restart foundation-redis

- name: Deploy Redis docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ redis_compose_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: restart foundation-redis

- name: Ensure Redis is running
  ansible.builtin.command: docker compose up -d
  args:
    chdir: "{{ redis_compose_dir }}"
  register: redis_up
  changed_when: "'Started' in redis_up.stderr or 'Created' in redis_up.stderr"

- name: Wait for Redis to accept connections
  ansible.builtin.wait_for:
    port: "{{ redis_port }}"
    delay: 3
    timeout: 60

- name: Verify Redis health
  ansible.builtin.command: docker exec foundation-redis redis-cli -p {{ redis_port }} -a {{ redis_password }} ping
  register: redis_health
  retries: 5
  delay: 5
  until: redis_health.rc == 0 and 'PONG' in redis_health.stdout
  changed_when: false
  no_log: true

- name: Display Redis summary
  ansible.builtin.debug:
    msg:
      - "=== Redis {{ redis_version }} ==="
      - ""
      - "Connection: redis://:<password>@{{ ansible_facts['default_ipv4']['address'] | default('10.0.0.200') }}:{{ redis_port }}"
      - "Data: {{ redis_data_dir }}"
      - "Compose: {{ redis_compose_dir }}"
      - ""
      - "Config: maxmemory={{ redis_maxmemory }}, policy={{ redis_maxmemory_policy }}, appendonly={{ redis_appendonly }}"
