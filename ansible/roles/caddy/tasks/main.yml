---
# Caddy installation and configuration tasks

- name: Install required dependencies
  ansible.builtin.apt:
    name:
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
      - curl
    state: present
    update_cache: yes

- name: Add Caddy GPG key
  ansible.builtin.get_url:
    url: https://dl.cloudsmith.io/public/caddy/stable/gpg.key
    dest: /usr/share/keyrings/caddy-stable-archive-keyring.asc
    mode: '0644'

- name: Add Caddy repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/usr/share/keyrings/caddy-stable-archive-keyring.asc] https://dl.cloudsmith.io/public/caddy/stable/deb/debian any-version main"
    state: present
    filename: caddy-stable

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes

- name: Install Caddy (base package)
  ansible.builtin.apt:
    name: caddy
    state: present

- name: Build Caddy with DNS provider support
  ansible.builtin.include_tasks: build-xcaddy.yml
  when:
    - caddy_dns_provider | default('') | length > 0

- name: Create Caddy directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ caddy_user }}"
    group: "{{ caddy_group }}"
    mode: '0755'
  loop:
    - "{{ caddy_config_dir }}"
    - "{{ caddy_data_dir }}"
    - "{{ caddy_log_dir }}"

- name: Create log files with proper permissions
  ansible.builtin.file:
    path: "{{ item }}"
    state: touch
    owner: "{{ caddy_user }}"
    group: "{{ caddy_group }}"
    mode: '0644'
    modification_time: preserve
    access_time: preserve
  loop:
    - "{{ caddy_log_dir }}/caddy.log"
    - "{{ caddy_log_dir }}/access.log"
    - "{{ caddy_log_dir }}/k8s-access.log"

- name: Create web root directory
  ansible.builtin.file:
    path: /var/www/html
    state: directory
    owner: "{{ caddy_user }}"
    group: "{{ caddy_group }}"
    mode: '0755'

- name: Create default index.html
  ansible.builtin.copy:
    content: |
      <!DOCTYPE html>
      <html lang="en">
      <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Welcome to Caddy</title>
          <style>
              body {
                  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                  display: flex;
                  justify-content: center;
                  align-items: center;
                  min-height: 100vh;
                  margin: 0;
                  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                  color: white;
              }
              .container {
                  text-align: center;
                  padding: 2rem;
                  background: rgba(255, 255, 255, 0.1);
                  border-radius: 10px;
                  backdrop-filter: blur(10px);
              }
              h1 { margin: 0 0 1rem 0; font-size: 3rem; }
              p { margin: 0.5rem 0; font-size: 1.2rem; opacity: 0.9; }
              .status { color: #4ade80; font-weight: bold; }
          </style>
      </head>
      <body>
          <div class="container">
              <h1>Caddy Web Server</h1>
              <p class="status">Running Successfully</p>
              <p>Automatic HTTPS Enabled</p>
          </div>
      </body>
      </html>
    dest: /var/www/html/index.html
    owner: "{{ caddy_user }}"
    group: "{{ caddy_group }}"
    mode: '0644'

- name: Create systemd override directory
  ansible.builtin.file:
    path: /etc/systemd/system/caddy.service.d
    state: directory
    mode: '0755'
  when:
    - caddy_dns_provider | default('') | length > 0

- name: Deploy systemd override with Cloudflare API token
  ansible.builtin.template:
    src: caddy-override.conf.j2
    dest: /etc/systemd/system/caddy.service.d/override.conf
    mode: '0600'
  when:
    - caddy_dns_provider | default('') | length > 0
  notify: restart caddy

- name: Determine which Caddyfile template to use
  ansible.builtin.set_fact:
    caddy_config_template_final: "{% if enable_k8s_proxy | default(false) | bool %}Caddyfile-k8s.j2{% else %}Caddyfile.j2{% endif %}"

- name: Deploy Caddyfile configuration
  ansible.builtin.template:
    src: "{{ caddy_config_template_final }}"
    dest: "{{ caddy_config_dir }}/Caddyfile"
    owner: "{{ caddy_user }}"
    group: "{{ caddy_group }}"
    mode: '0644'
    # Note: Skipping validate when using DNS provider - requires env var at runtime
    validate: "{{ omit if (caddy_dns_provider | default('') | length > 0) else 'caddy validate --adapter caddyfile --config %s' }}"
    backup: yes
  notify: restart caddy

- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: yes
  when:
    - caddy_dns_provider | default('') | length > 0

- name: Enable and start Caddy service
  ansible.builtin.systemd:
    name: caddy
    enabled: "{{ caddy_service_enabled }}"
    state: "{{ caddy_service_state }}"
    daemon_reload: yes

- name: Wait for Caddy to be ready
  ansible.builtin.wait_for:
    port: 80
    delay: 2
    timeout: 30

- name: Display Caddy status
  ansible.builtin.debug:
    msg:
      - "Caddy has been installed and configured"
      - "Configuration file: {{ caddy_config_dir }}/Caddyfile"
      - "Template used: {{ caddy_config_template_final }}"
      - "K8s proxy mode: {{ enable_k8s_proxy | default(false) }}"
      - "DNS provider: {{ caddy_dns_provider | default('none') }}"
      - "Service status: {{ caddy_service_state }}"
