---
# r730xd-openbao: OpenBao (HashiCorp Vault fork) on Docker with integrated Raft
# storage. Breaks the secrets-sprawl across Ansible Vault, Infisical, GitHub
# Secrets, and committed .env files by becoming the single source of truth.
#
# Raft (not Postgres) keeps OpenBao free of runtime dependencies on other
# foundation stores — no circular dependency at boot.
#
# Connection: https://<r730xd_ip>:8200 (self-signed; clients import ca.crt)

# Image (pinned)
openbao_version: "2.5.2"
openbao_image: "openbao/openbao:{{ openbao_version }}"

# Networking (host network, LAN-only — see ADR-023)
openbao_api_port: 8200
openbao_cluster_port: 8201
openbao_api_addr: "https://{{ r730xd_ip }}:{{ openbao_api_port }}"
openbao_cluster_addr: "https://{{ r730xd_ip }}:{{ openbao_cluster_port }}"
openbao_loopback_addr: "https://127.0.0.1:{{ openbao_api_port }}"

# Raft
openbao_node_id: "r730xd"
openbao_unseal_shares: 5
openbao_unseal_threshold: 3

# Filesystem layout — hot ZFS tier (see ADR-003)
openbao_data_dir: "/mnt/zfs/foundation/openbao/data"
openbao_audit_dir: "/mnt/zfs/foundation/openbao/audit"
openbao_backup_dir: "/mnt/zfs/foundation/openbao/backup"
openbao_compose_dir: "/opt/foundation/openbao"
openbao_config_dir: "/etc/openbao"
openbao_tls_dir: "{{ openbao_config_dir }}/tls"

# Self-signed TLS — regenerated if missing or within this many days of expiry
openbao_tls_cert_valid_days: 3650
openbao_tls_renew_within_days: 30
openbao_tls_ca_common_name: "grizzly-platform OpenBao CA"
openbao_tls_server_common_name: "r730xd.lab"
openbao_tls_server_alt_names:
  - "DNS:r730xd"
  - "DNS:r730xd.lab"
  - "DNS:localhost"
  - "IP:{{ r730xd_ip }}"
  - "IP:127.0.0.1"

# bao CLI (OpenBao release binary)
# Asset naming from github.com/openbao/openbao releases:
#   bao_<version>_Linux_x86_64.tar.gz   (uppercase Linux, x86_64 not amd64)
openbao_cli_install_dir: "/usr/local/bin"
openbao_cli_arch: "Linux_x86_64"
openbao_cli_download_url: >-
  https://github.com/openbao/openbao/releases/download/v{{ openbao_version
  }}/bao_{{ openbao_version }}_{{ openbao_cli_arch }}.tar.gz

# Infisical CLI install (official deb repo)
infisical_cli_apt_list: "/etc/apt/sources.list.d/infisical.list"
infisical_cli_keyring: "/usr/share/keyrings/infisical.gpg"

# Infisical bootstrap project (the only external dependency — holds unseal
# keys + root token. A compromise of this project is a seal compromise; the
# machine identity is scoped to this project only.)
#
# openbao_infisical_project_id is set in group_vars/all/vars.yml from
# .infisical.json (single source of truth). Not defaulted here so that
# vars_files-including plays don't accidentally override it.
openbao_infisical_env: "prod"
openbao_infisical_unseal_key_prefix: "OPENBAO_UNSEAL_KEY_"
openbao_infisical_root_token_key: "OPENBAO_ROOT_TOKEN"
openbao_infisical_auth_env_file: "{{ openbao_config_dir }}/infisical-auth.env"

# Auto-unseal systemd unit
openbao_unseal_script: "/usr/local/sbin/openbao-auto-unseal.sh"
openbao_wait_ready_script: "/usr/local/sbin/openbao-wait-ready.sh"
openbao_server_unit_name: "foundation-openbao.service"
openbao_unseal_unit_name: "openbao-auto-unseal.service"

# Backup (mirrors r730xd-postgres pattern)
openbao_backup_enabled: true
openbao_backup_retention_days: 14
openbao_backup_cron_hour: "2"
openbao_backup_cron_minute: "15"
openbao_backup_script: "{{ openbao_compose_dir }}/openbao-backup.sh"

# Audit log rotation (OpenBao never rotates its own audit log; this is
# critical — once the file is moved or truncated, OpenBao will stop writing
# audit entries and refuse requests if audit is required. Use copytruncate
# AND notify OpenBao to reload the audit device if we ever truncate.)
openbao_audit_logrotate_enabled: true
openbao_audit_log_file: "{{ openbao_audit_dir }}/audit.log"
openbao_audit_logrotate_frequency: "daily"
openbao_audit_logrotate_rotate_count: 14

# Infisical creds — values come from group_vars/all/vars.yml, which reads
# them from the encrypted vault. The role itself should never hardcode
# these; they arrive via vars.yml variables surfaced below.
openbao_infisical_client_id: "{{ infisical_openbao_client_id | default('') }}"
openbao_infisical_client_secret: >-
  {{ infisical_openbao_client_secret | default('') }}
