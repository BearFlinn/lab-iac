---
- name: Restart foundation-openbao
  ansible.builtin.systemd_service:
    name: "{{ openbao_server_unit_name }}"
    state: restarted
    daemon_reload: true
  listen: Restart foundation-openbao

# Re-run the scripted unseal after the server restarts, otherwise the
# box stays sealed until the next boot or a manual systemctl start.
- name: Restart openbao-auto-unseal
  ansible.builtin.systemd_service:
    name: "{{ openbao_unseal_unit_name }}"
    state: restarted
  listen: Restart foundation-openbao

- name: Reload logrotate config
  ansible.builtin.command: logrotate -d /etc/logrotate.d/openbao-audit
  changed_when: false
  listen: Reload openbao audit logrotate
