---
- name: restart observability-prometheus
  ansible.builtin.command: docker compose up -d --force-recreate
  args:
    chdir: "{{ prometheus_compose_dir }}"

- name: reload prometheus
  ansible.builtin.uri:
    url: "http://localhost:{{ prometheus_port }}/-/reload"
    method: POST
    status_code: 200
  failed_when: false
