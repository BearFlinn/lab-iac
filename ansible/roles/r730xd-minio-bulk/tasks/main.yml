---
# r730xd-minio-bulk: Deploy MinIO bulk instance as a Docker Compose service

- name: Create MinIO Bulk directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ minio_bulk_data_dir }}"
    - "{{ minio_bulk_compose_dir }}"

- name: Deploy MinIO Bulk docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ minio_bulk_compose_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: restart minio-bulk

- name: Ensure MinIO Bulk is running
  ansible.builtin.command: docker compose up -d
  args:
    chdir: "{{ minio_bulk_compose_dir }}"
  register: minio_bulk_up
  changed_when: "'Started' in minio_bulk_up.stderr or 'Created' in minio_bulk_up.stderr"

- name: Wait for MinIO Bulk API to accept connections
  ansible.builtin.wait_for:
    port: "{{ minio_bulk_api_port }}"
    delay: 3
    timeout: 60

- name: Verify MinIO Bulk health
  ansible.builtin.uri:
    url: "http://localhost:{{ minio_bulk_api_port }}/minio/health/live"
    status_code: 200
  retries: 5
  delay: 5
  register: minio_bulk_health
  until: minio_bulk_health.status == 200

- name: Display MinIO Bulk summary
  ansible.builtin.debug:
    msg:
      - "=== MinIO Bulk (registry/artifacts) ==="
      - ""
      - "API: http://{{ ansible_facts['default_ipv4']['address'] | default(r730xd_ip) }}:{{ minio_bulk_api_port }}"
      - "Console: http://{{ ansible_facts['default_ipv4']['address'] | default(r730xd_ip) }}:{{ minio_bulk_console_port }}"
      - "Data: {{ minio_bulk_data_dir }}"
      - "Backing: MergerFS (/mnt/pool)"
