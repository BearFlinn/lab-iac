---
# r730xd-minio-bulk: MinIO S3-compatible object storage (bulk instance)
# Cold instance on MergerFS pool — serves container registry and build artifacts
# Write-once-read-many workload, SnapRAID-compatible
#
# API: http://10.0.0.200:9002
# Console: http://10.0.0.200:9003

# Image
minio_bulk_image: "minio/minio:latest"

# Networking (published ports — not host network)
minio_bulk_api_port: 9002
minio_bulk_console_port: 9003

# Directories (MergerFS-backed)
minio_bulk_data_dir: "/mnt/pool/foundation/minio-bulk/data"
minio_bulk_compose_dir: "/opt/foundation/minio-bulk"

# Root credentials (set via vault — see group_vars/all/vars.yml)
# minio_bulk_root_user: "{{ vault_minio_bulk_root_user }}"
# minio_bulk_root_password: "{{ vault_minio_bulk_root_password }}"
# (inherited from group_vars/all/vars.yml)
