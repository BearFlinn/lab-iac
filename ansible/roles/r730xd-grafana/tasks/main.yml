---
# r730xd-grafana: Deploy Grafana as a Docker Compose service

- name: Create Grafana data directory
  ansible.builtin.file:
    path: "{{ grafana_data_dir }}"
    state: directory
    owner: "472"
    group: "0"
    mode: "0755"

- name: Create Grafana config directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ grafana_compose_dir }}"
    - "{{ grafana_compose_dir }}/provisioning/datasources"
    - "{{ grafana_compose_dir }}/provisioning/dashboards"
    - "{{ grafana_compose_dir }}/provisioning/alerting"
    - "{{ grafana_compose_dir }}/dashboards"

- name: Deploy Grafana data sources provisioning
  ansible.builtin.template:
    src: datasources.yml.j2
    dest: "{{ grafana_compose_dir }}/provisioning/datasources/datasources.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart observability-grafana

- name: Deploy Grafana dashboard provisioning config
  ansible.builtin.template:
    src: dashboards.yml.j2
    dest: "{{ grafana_compose_dir }}/provisioning/dashboards/dashboards.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart observability-grafana

- name: Deploy Grafana alerting provisioning
  ansible.builtin.template:
    src: alerting.yml.j2
    dest: "{{ grafana_compose_dir }}/provisioning/alerting/alerting.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart observability-grafana

- name: Copy dashboard JSON files
  ansible.builtin.copy:
    src: "dashboards/"
    dest: "{{ grafana_compose_dir }}/dashboards/"
    owner: root
    group: root
    mode: "0644"
  notify: Restart observability-grafana

- name: Deploy Grafana docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ grafana_compose_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart observability-grafana

- name: Ensure Grafana is running
  ansible.builtin.command: docker compose up -d
  args:
    chdir: "{{ grafana_compose_dir }}"
  register: grafana_up
  changed_when: "'Started' in grafana_up.stderr or 'Created' in grafana_up.stderr"

- name: Wait for Grafana to accept connections
  ansible.builtin.wait_for:
    port: "{{ grafana_port }}"
    delay: 5
    timeout: 90

- name: Verify Grafana health
  ansible.builtin.uri:
    url: "http://localhost:{{ grafana_port }}/api/health"
    status_code: 200
  retries: 10
  delay: 5
  register: grafana_health
  until: grafana_health.status == 200

- name: Display Grafana summary
  ansible.builtin.debug:
    msg:
      - "=== Grafana ==="
      - ""
      - "URL: http://{{ ansible_facts['default_ipv4']['address'] | default(r730xd_ip) }}:{{ grafana_port }}"
      - "User: {{ grafana_admin_user }}"
      - "Data: {{ grafana_data_dir }}"
      - "Database: {{ grafana_database_type }}://{{ grafana_database_host }}/{{ grafana_database_name }}"
      - "Data sources: Prometheus, Loki, Tempo"
