---
# Tasks for preparing nodes with Kubernetes prerequisites
# This role configures the OS for running Kubernetes

- name: Load required kernel modules
  community.general.modprobe:
    name: "{{ item }}"
    state: present
    persistent: present
  loop:
    - overlay
    - br_netfilter
  become: yes

- name: Set sysctl parameters for Kubernetes (dual-stack)
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    sysctl_set: yes
    reload: yes
  loop:
    - { name: 'net.bridge.bridge-nf-call-iptables', value: '1' }
    - { name: 'net.bridge.bridge-nf-call-ip6tables', value: '1' }
    - { name: 'net.ipv4.ip_forward', value: '1' }
    - { name: 'net.ipv6.conf.all.forwarding', value: '1' }
    - { name: 'net.ipv6.conf.default.forwarding', value: '1' }
    # accept_ra=2 allows accepting Router Advertisements even when forwarding is enabled
    # Without this, nodes won't get global IPv6 addresses via SLAAC
    - { name: 'net.ipv6.conf.all.accept_ra', value: '2' }
    - { name: 'net.ipv6.conf.default.accept_ra', value: '2' }
  become: yes

- name: Install Kubernetes prerequisite packages
  ansible.builtin.apt:
    name:
      - conntrack
      - ethtool
    state: present
    update_cache: yes
  become: yes

- name: Disable swap permanently
  block:
    - name: Disable swap immediately
      ansible.builtin.command: swapoff -a
      changed_when: false

    - name: Remove swap entries from /etc/fstab
      ansible.builtin.lineinfile:
        path: /etc/fstab
        regexp: '^.*\s+swap\s+swap.*$'
        state: absent
  become: yes

- name: Install containerd and dependencies
  ansible.builtin.apt:
    name:
      - containerd
      - runc
    state: present
    update_cache: yes
  become: yes

- name: Create containerd config directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: '0755'
  become: yes

- name: Remove Debian default containerd config
  ansible.builtin.file:
    path: /etc/containerd/config.toml
    state: absent
  become: yes

- name: Generate full containerd configuration
  ansible.builtin.shell: containerd config default > /etc/containerd/config.toml
  become: yes

- name: Configure containerd to use systemd cgroup driver
  ansible.builtin.shell: sed -i 's/SystemdCgroup = false/SystemdCgroup = true/g' /etc/containerd/config.toml
  become: yes
  notify: restart containerd

- name: Configure containerd CNI bin directory
  ansible.builtin.shell: sed -i 's|bin_dir = "/usr/lib/cni"|bin_dir = "/opt/cni/bin"|g' /etc/containerd/config.toml
  become: yes
  notify: restart containerd

- name: Validate containerd configuration
  ansible.builtin.command: containerd config dump
  become: yes
  register: containerd_config_validation
  failed_when: containerd_config_validation.rc != 0
  changed_when: false

- name: Flush handlers to ensure containerd restarts before kubelet installation
  meta: flush_handlers

- name: Enable and start containerd service
  ansible.builtin.systemd:
    name: containerd
    enabled: yes
    state: started
  become: yes

- name: Create CNI directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /opt/cni/bin
    - /etc/cni/net.d
  become: yes

- name: Install CNI plugins
  block:
    - name: Download CNI plugins (with retries)
      ansible.builtin.get_url:
        url: "https://github.com/containernetworking/plugins/releases/download/v1.3.0/cni-plugins-linux-amd64-v1.3.0.tgz"
        dest: /tmp/cni-plugins.tgz
        mode: '0644'
        timeout: 60
      become: yes
      retries: 3
      delay: 5
      register: cni_download
      until: cni_download is succeeded

    - name: Extract CNI plugins
      ansible.builtin.unarchive:
        src: /tmp/cni-plugins.tgz
        dest: /opt/cni/bin
        remote_src: yes
      become: yes
  rescue:
    - name: Check if CNI plugins already exist
      ansible.builtin.stat:
        path: /opt/cni/bin/bridge
      register: cni_exists
      become: yes

    - name: Fail if CNI plugins missing
      ansible.builtin.fail:
        msg: "Failed to install CNI plugins and they don't exist"
      when: not cni_exists.stat.exists

- name: Install crictl (CRI CLI tool)
  ansible.builtin.apt:
    name: cri-tools
    state: present
  become: yes
  ignore_errors: yes

- name: Configure crictl to use containerd
  ansible.builtin.copy:
    content: |
      runtime-endpoint: unix:///var/run/containerd/containerd.sock
      image-endpoint: unix:///var/run/containerd/containerd.sock
      timeout: 10
    dest: /etc/crictl.yaml
    mode: '0644'
  become: yes
