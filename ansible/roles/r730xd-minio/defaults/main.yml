---
# r730xd-minio: MinIO S3-compatible object storage on Docker
# Data on MergerFS pool, consumed by K8s workloads and staging services
#
# API: http://10.0.0.200:9000
# Console: http://10.0.0.200:9001

# Image
minio_image: "minio/minio:latest"

# Networking (published ports — not host network)
minio_api_port: 9000
minio_console_port: 9001

# Directories
minio_data_dir: "/mnt/pool/foundation/minio/data"
minio_compose_dir: "/opt/foundation/minio"

# Root credentials (set via vault — see group_vars/all/vars.yml)
# minio_root_user: "{{ vault_minio_root_user }}"
# minio_root_password: "{{ vault_minio_root_password }}"
# (inherited from group_vars/all/vars.yml)
