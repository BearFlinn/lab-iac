---
# ingress-tunnel: Install WireGuard and bring up a point-to-point tunnel.
#
# On the client side, also installs iptables DNAT rules (via wg-quick
# PostUp/PostDown hooks) to forward specific ports to a LAN target.

- name: Validate tunnel_role
  ansible.builtin.assert:
    that:
      - tunnel_role in ["server", "client"]
    fail_msg: "tunnel_role must be 'server' or 'client' (got: '{{ tunnel_role }}')"

- name: Validate client-side inputs
  ansible.builtin.assert:
    that:
      - wg_server_endpoint | length > 0
      - ingress_dnat_rules is iterable
    fail_msg: "client mode requires wg_server_endpoint to be set"
  when: tunnel_role == "client"

- name: Install WireGuard and iptables
  ansible.builtin.apt:
    name:
      - wireguard
      - wireguard-tools
      - iptables
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: Ensure /etc/wireguard exists
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    owner: root
    group: root
    mode: '0700'

- name: Enable IPv4 forwarding (client side)
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: '1'
    sysctl_set: yes
    state: present
    reload: yes
  when: tunnel_role == "client"

- name: Write WireGuard config
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: "/etc/wireguard/{{ wg_interface }}.conf"
    owner: root
    group: root
    mode: '0600'
  no_log: true
  notify: Restart wireguard

- name: Enable and start wg-quick
  ansible.builtin.systemd:
    name: "wg-quick@{{ wg_interface }}"
    enabled: yes
    state: started
    daemon_reload: yes

- name: Flush handlers so tunnel restarts before we check status
  ansible.builtin.meta: flush_handlers

- name: Check WireGuard handshake
  ansible.builtin.command: "wg show {{ wg_interface }} latest-handshakes"
  register: wg_handshake
  changed_when: false
  failed_when: false

- name: Display WireGuard status
  ansible.builtin.debug:
    msg: >-
      WireGuard {{ wg_interface }} ({{ tunnel_role }}):
      {{ wg_handshake.stdout_lines | default(['no peers']) | join(' | ') }}
