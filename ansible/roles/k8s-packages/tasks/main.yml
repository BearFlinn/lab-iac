---
# k8s-packages: Install kubeadm, kubelet, kubectl from pkgs.k8s.io
# Adapted from archive/pre-migration-2026/ansible/roles/k8s-packages/
# Run on all K8s nodes (control plane + workers) before kubeadm init/join.

# ==========================================================================
# Apt Repository Setup
# ==========================================================================

- name: Install prerequisites for Kubernetes repository
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gpg
    state: present
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: yes

- name: Download Kubernetes GPG key
  ansible.builtin.get_url:
    url: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/Release.key"
    dest: /tmp/kubernetes-release.key
    mode: "0644"
    timeout: 60
  retries: 3
  delay: 5
  register: k8s_gpg_download
  until: k8s_gpg_download is succeeded
  become: yes

- name: Add Kubernetes GPG key to keyring
  ansible.builtin.shell: gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg < /tmp/kubernetes-release.key
  args:
    creates: /etc/apt/keyrings/kubernetes-apt-keyring.gpg
  become: yes

- name: Clean up GPG key download
  ansible.builtin.file:
    path: /tmp/kubernetes-release.key
    state: absent
  become: yes

- name: Add Kubernetes apt repository
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/deb/ /"
    filename: kubernetes
    state: present
  become: yes

# ==========================================================================
# Package Installation
# ==========================================================================

- name: Install Kubernetes packages
  ansible.builtin.apt:
    name:
      - kubelet
      - kubeadm
      - kubectl
    state: present
    update_cache: yes
  become: yes

- name: Hold Kubernetes packages at current version
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop:
    - kubelet
    - kubeadm
    - kubectl
  become: yes

- name: Enable kubelet service
  ansible.builtin.systemd:
    name: kubelet
    enabled: yes
  become: yes

# ==========================================================================
# Verification
# ==========================================================================

- name: Get installed kubeadm version
  ansible.builtin.command: kubeadm version -o short
  changed_when: false
  register: kubeadm_version
  become: yes

- name: Display K8s packages summary
  ansible.builtin.debug:
    msg:
      - "=== Kubernetes Packages Installed ==="
      - "kubeadm: {{ kubeadm_version.stdout }}"
      - "kubelet: enabled (will start after kubeadm init/join)"
