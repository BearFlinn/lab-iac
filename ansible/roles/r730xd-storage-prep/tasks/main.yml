---
# R730xd Storage Preparation
# Mounts drives at bay-based paths using resolved_drives fact from playbook pre-tasks
# Partitions, formats, and mounts each drive at /mnt/data/bay<N>

- name: Validate resolved_drives fact exists
  ansible.builtin.assert:
    that:
      - resolved_drives is defined
      - resolved_drives | length > 0
    fail_msg: >
      resolved_drives fact is not set. This role must be called from
      r730xd-storage.yml which resolves drive bays via iDRAC in pre_tasks.

- name: Install parted (required for partitioning)
  ansible.builtin.apt:
    name: parted
    state: present

- name: Display resolved drives
  ansible.builtin.debug:
    msg: "Bay {{ item.bay }} ({{ item.role }}): /dev/{{ item.device }} — serial {{ item.serial }}"
  loop: "{{ resolved_drives }}"
  loop_control:
    label: "bay{{ item.bay }}"

- name: Create GPT partition table on each drive
  community.general.parted:
    device: "/dev/{{ item.device }}"
    label: gpt
    state: info
  register: disk_info
  loop: "{{ resolved_drives }}"
  loop_control:
    label: "bay{{ item.bay }} (/dev/{{ item.device }})"

- name: Create single partition on drives without partitions
  community.general.parted:
    device: "/dev/{{ item.item.device }}"
    number: 1
    label: gpt
    part_start: "0%"
    part_end: "100%"
    state: present
  when: item.partitions | length == 0
  loop: "{{ disk_info.results }}"
  loop_control:
    label: "bay{{ item.item.bay }}"

- name: Build partition device list
  ansible.builtin.set_fact:
    drive_partitions: >-
      {{
        resolved_drives | map(attribute='device')
        | map('regex_replace', '$', '1')
        | list
      }}

- name: Create ext4 filesystem on each partition (skips existing)
  ansible.builtin.filesystem:
    fstype: "{{ storage_filesystem }}"
    dev: "/dev/{{ item }}"
    opts: "{{ storage_mkfs_options }}"
  loop: "{{ drive_partitions }}"
  loop_control:
    label: "{{ item }}"

- name: Create mount point directories
  ansible.builtin.file:
    path: "{{ storage_mount_base }}/bay{{ resolved_drives[idx].bay }}"
    state: directory
    mode: "0755"
  loop: "{{ drive_partitions }}"
  loop_control:
    index_var: idx
    label: "bay{{ resolved_drives[idx].bay }}"

- name: Get partition UUIDs
  ansible.builtin.command: "blkid -s UUID -o value /dev/{{ item }}"
  register: partition_uuids
  changed_when: false
  loop: "{{ drive_partitions }}"
  loop_control:
    label: "{{ item }}"

- name: Mount partitions and add to fstab
  ansible.builtin.mount:
    path: "{{ storage_mount_base }}/bay{{ resolved_drives[idx].bay }}"
    src: "UUID={{ item.stdout }}"
    fstype: "{{ storage_filesystem }}"
    opts: "{{ storage_mount_options }}"
    state: mounted
  loop: "{{ partition_uuids.results }}"
  loop_control:
    index_var: idx
    label: "bay{{ resolved_drives[idx].bay }} (UUID={{ item.stdout }})"

- name: Build list of active mount points
  ansible.builtin.set_fact:
    active_mount_points: >-
      {{
        resolved_drives | map(attribute='bay')
        | map('regex_replace', '^(.*)$', storage_mount_base ~ '/bay\1')
        | list
      }}

- name: Find all existing bay mount point directories
  ansible.builtin.find:
    paths: "{{ storage_mount_base }}"
    file_type: directory
    patterns: "bay*"
  register: existing_mount_dirs

- name: Identify stale mount points (no longer backed by a drive)
  ansible.builtin.set_fact:
    stale_mount_points: >-
      {{
        existing_mount_dirs.files | map(attribute='path')
        | reject('in', active_mount_points)
        | list
      }}

- name: Remove stale fstab entries and unmount missing drives
  ansible.builtin.mount:
    path: "{{ item }}"
    state: absent
  loop: "{{ stale_mount_points }}"
  loop_control:
    label: "{{ item }}"

- name: Remove stale mount point directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop: "{{ stale_mount_points }}"
  loop_control:
    label: "{{ item }}"

- name: Build data_drive_mounts fact for downstream roles
  ansible.builtin.set_fact:
    data_drive_mounts: "{{ _mounts }}"
  vars:
    _mounts: >-
      {%- set result = [] -%}
      {%- for drive in resolved_drives -%}
        {%- set _ = result.append({
          'bay': drive.bay,
          'role': drive.role,
          'serial': drive.serial,
          'device': drive.device,
          'path': storage_mount_base ~ '/bay' ~ drive.bay | string
        }) -%}
      {%- endfor -%}
      {{ result }}

- name: Display final storage layout
  ansible.builtin.command: lsblk -o NAME,SIZE,TYPE,FSTYPE,MOUNTPOINT
  register: final_lsblk
  changed_when: false

- name: Show storage layout
  ansible.builtin.debug:
    msg: "{{ final_lsblk.stdout_lines }}"

- name: Display storage summary
  ansible.builtin.debug:
    msg:
      - "=== R730xd Storage Preparation Complete ==="
      - ""
      - "Drives: {{ resolved_drives | length }}"
      - "  Parity: {{ resolved_drives | selectattr('role', 'equalto', 'parity') | list | length }}"
      - "  Data: {{ resolved_drives | selectattr('role', 'equalto', 'data') | list | length }}"
      - "Filesystem: {{ storage_filesystem }}"
      - "Mount base: {{ storage_mount_base }}"
      - "Mount paths: {{ data_drive_mounts | map(attribute='path') | list | join(', ') }}"
