---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: Restart snapraid-sync timer
  ansible.builtin.systemd:
    name: snapraid-sync.timer
    state: restarted
    daemon_reload: true

- name: Restart snapraid-scrub timer
  ansible.builtin.systemd:
    name: snapraid-scrub.timer
    state: restarted
    daemon_reload: true
