---
- name: reload systemd
  ansible.builtin.systemd:
    daemon_reload: true

- name: restart snapraid-sync timer
  ansible.builtin.systemd:
    name: snapraid-sync.timer
    state: restarted
    daemon_reload: true

- name: restart snapraid-scrub timer
  ansible.builtin.systemd:
    name: snapraid-scrub.timer
    state: restarted
    daemon_reload: true
