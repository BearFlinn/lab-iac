---
# r730xd-minio-obs: Deploy MinIO observability instance as a Docker Compose service

- name: Create MinIO Obs directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ minio_obs_data_dir }}"
    - "{{ minio_obs_compose_dir }}"

- name: Deploy MinIO Obs docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ minio_obs_compose_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: restart minio-obs

- name: Ensure MinIO Obs is running
  ansible.builtin.command: docker compose up -d
  args:
    chdir: "{{ minio_obs_compose_dir }}"
  register: minio_obs_up
  changed_when: "'Started' in minio_obs_up.stderr or 'Created' in minio_obs_up.stderr"

- name: Wait for MinIO Obs API to accept connections
  ansible.builtin.wait_for:
    port: "{{ minio_obs_api_port }}"
    delay: 3
    timeout: 60

- name: Verify MinIO Obs health
  ansible.builtin.uri:
    url: "http://localhost:{{ minio_obs_api_port }}/minio/health/live"
    status_code: 200
  retries: 5
  delay: 5
  register: minio_obs_health
  until: minio_obs_health.status == 200

- name: Display MinIO Obs summary
  ansible.builtin.debug:
    msg:
      - "=== MinIO Obs (observability) ==="
      - ""
      - "API: http://{{ ansible_facts['default_ipv4']['address'] | default(r730xd_ip) }}:{{ minio_obs_api_port }}"
      - "Console: http://{{ ansible_facts['default_ipv4']['address'] | default(r730xd_ip) }}:{{ minio_obs_console_port }}"
      - "Data: {{ minio_obs_data_dir }}"
      - "Backing: ZFS (tank/foundation/minio-obs)"
