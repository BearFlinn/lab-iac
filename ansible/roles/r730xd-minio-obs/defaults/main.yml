---
# r730xd-minio-obs: MinIO S3-compatible object storage (observability instance)
# Hot instance on ZFS pool — serves Loki and Tempo S3 backends
# Continuous writes, 30-day retention — incompatible with SnapRAID
#
# API: http://<r730xd_ip>:9000
# Console: http://<r730xd_ip>:9001

# Image
minio_obs_image: "minio/minio:latest"

# Networking (published ports — not host network)
minio_obs_api_port: 9000
minio_obs_console_port: 9001

# Directories (ZFS-backed)
minio_obs_data_dir: "/mnt/zfs/foundation/minio-obs/data"
minio_obs_compose_dir: "/opt/foundation/minio-obs"

# Root credentials (set via vault — see group_vars/all/vars.yml)
# minio_obs_root_user: "{{ vault_minio_obs_root_user }}"
# minio_obs_root_password: "{{ vault_minio_obs_root_password }}"
# (inherited from group_vars/all/vars.yml)
