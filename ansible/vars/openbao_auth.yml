---
# ansible_hashi_vault_* variables set defaults for every
# community.hashi_vault lookup + module call in the current play.
# Load via vars_files (AFTER vault.yml + vars.yml) in any playbook that
# reads platform secrets from OpenBao.
#
# Auth is AppRole with the ansible-iac role → ansible-platform-read
# policy (see bootstrap-openbao.yml). role_id and secret_id live in
# vault.yml; they were populated by scripts/set-openbao-approle-secrets.sh.
#
# The role is CIDR-bound to 10.0.0.0/24 so a leak off-LAN is unusable.
#
# URL comes from group_vars/all/vars.yml (openbao_api_addr), which
# resolves against network.yml's r730xd_ip. Keeps the IP a
# single-source-of-truth.
ansible_hashi_vault_url: "{{ openbao_api_addr }}"
ansible_hashi_vault_ca_cert: "{{ openbao_tls_ca_path }}"
ansible_hashi_vault_auth_method: approle
ansible_hashi_vault_role_id: "{{ vault_openbao_approle_role_id }}"
ansible_hashi_vault_secret_id: "{{ vault_openbao_approle_secret_id }}"
